<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Create Account — PassReady Prep</title>
<meta name="description" content="Create your PassReady Prep account and start preparing for the NCMHCE with clinical case simulations and a pass guarantee.">
<link rel="canonical" href="https://www.passreadyprep.com/register.html">
<meta property="og:type" content="website">
<meta property="og:site_name" content="PassReady Prep">
<meta property="og:title" content="Create Account — PassReady Prep">
<meta property="og:description" content="Create your PassReady Prep account and start preparing for the NCMHCE with clinical case simulations and a pass guarantee.">
<meta property="og:url" content="https://www.passreadyprep.com/register.html">
<meta property="og:image" content="https://www.passreadyprep.com/og.png">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="Create Account — PassReady Prep">
<meta name="twitter:description" content="Create your PassReady Prep account and start preparing for the NCMHCE with clinical case simulations and a pass guarantee.">
<meta name="twitter:image" content="https://www.passreadyprep.com/og.png">
<style>
  :root{
    --emerald:#10B981;--emerald-400:#34D399;--slate-900:#0F172A;--slate-800:#1E293B;
    --slate-700:#334155;--slate-600:#475569;--slate-500:#64748B;--slate-400:#94A3B8;
    --slate-300:#CBD5E1;--white:#F8FAFC;--red:#EF4444;
    --card:rgba(30,41,59,.6);--card-border:rgba(51,65,85,.6);
    --sans:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
  }
  *{box-sizing:border-box}
  body{margin:0;min-height:100vh;display:grid;place-items:center;
    background:linear-gradient(160deg,#0F172A 0%,#1E293B 50%,#0F172A 100%);
    background-attachment:fixed;font-family:var(--sans);color:var(--slate-300);padding:24px}

  .card{background:var(--card);border:1px solid var(--card-border);border-radius:20px;
    padding:40px 36px;max-width:440px;width:100%;box-shadow:0 24px 60px -20px rgba(0,0,0,.5)}

  /* brand */
  .brand-wrap{display:flex;align-items:center;gap:10px;text-decoration:none;color:inherit;margin-bottom:28px}
  .brand-chip{width:36px;height:36px;border-radius:10px;background:rgba(16,185,129,.16);
    display:grid;place-items:center;flex:0 0 auto}
  .brand-chip svg{width:20px;height:20px;color:var(--emerald-400)}
  .brand{font-weight:700;font-size:17px;color:var(--white);letter-spacing:-.01em}
  .brand .prep{color:var(--emerald-400)}

  h1{font-size:22px;font-weight:800;color:var(--white);letter-spacing:-.02em;margin:0 0 6px}
  .sub{color:var(--slate-400);font-size:14.5px;margin:0 0 26px;line-height:1.5}

  /* tabs */
  .tabs{display:grid;grid-template-columns:1fr 1fr;gap:2px;background:var(--slate-700);
    border-radius:10px;padding:3px;margin-bottom:24px}
  .tab-btn{background:transparent;border:none;border-radius:8px;padding:9px;font:600 14px/1 var(--sans);
    color:var(--slate-400);cursor:pointer;transition:all .15s}
  .tab-btn.active{background:var(--slate-800);color:var(--white)}

  /* form */
  .form-panel{display:none}
  .form-panel.active{display:block}

  label{display:block;font-size:12px;font-weight:700;letter-spacing:.04em;
    text-transform:uppercase;color:var(--slate-400);margin:0 0 6px}
  input[type=text],input[type=email],input[type=password]{
    width:100%;background:rgba(15,23,42,.55);border:1px solid var(--card-border);
    border-radius:10px;color:var(--white);font:inherit;font-size:15px;
    padding:11px 14px;outline:none;transition:border-color .15s;margin-bottom:16px}
  input:focus{border-color:var(--emerald)}
  input::placeholder{color:var(--slate-600)}

  /* terms checkbox */
  .terms-row{display:flex;align-items:flex-start;gap:10px;margin-bottom:20px}
  .terms-row input[type=checkbox]{
    width:18px;height:18px;flex:0 0 auto;margin-top:2px;accent-color:var(--emerald);cursor:pointer}
  .terms-row label{font-size:13.5px;color:var(--slate-400);text-transform:none;
    letter-spacing:0;font-weight:400;line-height:1.55;cursor:pointer;margin:0}
  .terms-row a{color:var(--emerald-400);text-decoration:none}
  .terms-row a:hover{text-decoration:underline}

  .btn{width:100%;background:var(--emerald);color:#04261C;border:none;border-radius:12px;
    padding:13px;font:700 15px/1 var(--sans);cursor:pointer;transition:background .15s}
  .btn:hover:not(:disabled){background:var(--emerald-400)}
  .btn:disabled{opacity:.45;cursor:not-allowed}

  .divider{display:flex;align-items:center;gap:12px;margin:18px 0}
  .divider hr{flex:1;border:none;border-top:1px solid var(--card-border)}
  .divider span{font-size:12px;color:var(--slate-600)}

  .err{color:var(--red);font-size:13.5px;margin:0 0 14px;display:none;line-height:1.5}

  .switch{text-align:center;margin-top:18px;font-size:14px;color:var(--slate-500)}
  .switch a{color:var(--emerald-400);text-decoration:none;font-weight:600}

  :focus-visible{outline:2.5px solid var(--emerald-400);outline-offset:2px;border-radius:6px}
</style>
</head>
<body>
<div class="card">
  <a class="brand-wrap" href="/landing.html" aria-label="PassReady Prep home">
    <span class="brand-chip" aria-hidden="true">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21.42 10.922a1 1 0 0 0-.019-1.838L12.83 5.18a2 2 0 0 0-1.66 0L2.6 9.08a1 1 0 0 0 0 1.832l8.57 3.908a2 2 0 0 0 1.66 0z"/>
        <path d="M22 10v6"/><path d="M6 12.5V16a6 3 0 0 0 12 0v-3.5"/>
      </svg>
    </span>
    <span class="brand">PassReady <span class="prep">Prep</span></span>
  </a>

  <div class="tabs" role="tablist">
    <button class="tab-btn active" id="tab-register" role="tab" aria-selected="true" onclick="showTab('register')">Create account</button>
    <button class="tab-btn" id="tab-login" role="tab" aria-selected="false" onclick="showTab('login')">Sign in</button>
  </div>

  <!-- REGISTER -->
  <div class="form-panel active" id="panel-register" role="tabpanel">
    <p class="err" id="reg-err"></p>
    <label for="reg-name">Name</label>
    <input type="text" id="reg-name" placeholder="Your name" autocomplete="name"/>

    <label for="reg-email">Email</label>
    <input type="email" id="reg-email" placeholder="you@example.com" autocomplete="email"/>

    <label for="reg-password">Password <span style="color:var(--slate-600);text-transform:none;letter-spacing:0;font-weight:400">(8+ characters)</span></label>
    <input type="password" id="reg-password" placeholder="••••••••" autocomplete="new-password"/>

    <div class="terms-row">
      <input type="checkbox" id="reg-terms"/>
      <label for="reg-terms">
        I agree to the <a href="/policies.html#terms" target="_blank">Terms of Service</a>
        and <a href="/policies.html#privacy" target="_blank">Privacy Policy</a>
      </label>
    </div>

    <button class="btn" id="reg-btn" onclick="register()">Create account</button>

    <div class="switch">Already have an account? <a href="#" onclick="showTab('login');return false">Sign in</a></div>
  </div>

  <!-- LOGIN -->
  <div class="form-panel" id="panel-login" role="tabpanel">
    <p class="err" id="login-err"></p>
    <label for="login-email">Email</label>
    <input type="email" id="login-email" placeholder="you@example.com" autocomplete="email"/>

    <label for="login-password">Password</label>
    <input type="password" id="login-password" placeholder="••••••••" autocomplete="current-password"/>

    <button class="btn" id="login-btn" onclick="login()">Sign in</button>

    <div style="text-align:center;margin-top:14px"><a href="/forgot-password.html" style="color:var(--emerald-400);text-decoration:none;font-size:13.5px;font-weight:600">Forgot your password?</a></div>

    <div class="switch">Don't have an account? <a href="#" onclick="showTab('register');return false">Create one</a></div>
  </div>
</div>

<script>
  // Where to go after auth — checkout?tier=X if coming from pricing, otherwise the app
  const params = new URLSearchParams(location.search);
  const next = params.get('next') || '/';

  function showTab(tab) {
    ['register','login'].forEach(t => {
      document.getElementById('panel-' + t).classList.toggle('active', t === tab);
      const btn = document.getElementById('tab-' + t);
      btn.classList.toggle('active', t === tab);
      btn.setAttribute('aria-selected', t === tab);
    });
    document.getElementById(tab === 'register' ? 'reg-err' : 'login-err').style.display = 'none';
  }

  function showErr(id, msg) {
    const el = document.getElementById(id);
    el.textContent = msg;
    el.style.display = 'block';
  }

  async function register() {
    const name     = document.getElementById('reg-name').value.trim();
    const email    = document.getElementById('reg-email').value.trim();
    const password = document.getElementById('reg-password').value;
    const terms    = document.getElementById('reg-terms').checked;
    const btn      = document.getElementById('reg-btn');

    document.getElementById('reg-err').style.display = 'none';

    if (!email || !password) { showErr('reg-err','Email and password are required.'); return; }
    if (password.length < 8) { showErr('reg-err','Password must be at least 8 characters.'); return; }
    if (!terms) { showErr('reg-err','Please agree to the Terms of Service and Privacy Policy to continue.'); return; }

    btn.disabled = true; btn.textContent = 'Creating account…';

    try {
      const r = await fetch('/api/auth/register', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name, email, password, termsAccepted: true }),
      });
      const data = await r.json();
      if (!r.ok) {
        showErr('reg-err', data.error || 'Something went wrong. Please try again.');
        btn.disabled = false; btn.textContent = 'Create account';
        return;
      }
      localStorage.setItem('prp_token', data.token);
      localStorage.setItem('prp_user', JSON.stringify(data.user));
      window.location.href = next;
    } catch (e) {
      showErr('reg-err','Network error. Please try again.');
      btn.disabled = false; btn.textContent = 'Create account';
    }
  }

  async function login() {
    const email    = document.getElementById('login-email').value.trim();
    const password = document.getElementById('login-password').value;
    const btn      = document.getElementById('login-btn');

    document.getElementById('login-err').style.display = 'none';

    if (!email || !password) { showErr('login-err','Email and password are required.'); return; }

    btn.disabled = true; btn.textContent = 'Signing in…';

    try {
      const r = await fetch('/api/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password }),
      });
      const data = await r.json();
      if (!r.ok) {
        showErr('login-err', data.error || 'Could not sign in. Please try again.');
        btn.disabled = false; btn.textContent = 'Sign in';
        return;
      }
      localStorage.setItem('prp_token', data.token);
      localStorage.setItem('prp_user', JSON.stringify(data.user));
      window.location.href = next;
    } catch (e) {
      showErr('login-err','Network error. Please try again.');
      btn.disabled = false; btn.textContent = 'Sign in';
    }
  }

  // Enter key submits active form
  document.addEventListener('keydown', e => {
    if (e.key !== 'Enter') return;
    const active = document.querySelector('.form-panel.active');
    if (active.id === 'panel-register') register();
    else login();
  });

  // If already logged in, skip straight to destination
  const token = localStorage.getItem('prp_token');
  if (token) window.location.href = next;
</script>
</body>
</html>
