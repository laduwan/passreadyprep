<style>
  :root{
    --slate-900:#0F172A; --slate-800:#1E293B; --slate-700:#334155; --slate-600:#475569;
    --slate-500:#64748B; --slate-400:#94A3B8; --slate-300:#CBD5E1; --slate-200:#E2E8F0; --white:#F8FAFC;
    --emerald:#10B981; --emerald-400:#34D399;
    --blue-400:#60A5FA; --blue:#3B82F6;
    --amber-400:#FBBF24; --amber:#F59E0B;
    --red-400:#F87171; --red:#EF4444; --red-600:#DC2626;
    --purple-400:#A78BFA; --purple:#8B5CF6;
    --sans:system-ui,-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    --r-xl:16px; --r-lg:12px; --r-md:10px;
    --card:rgba(30,41,59,.55); --card-border:rgba(51,65,85,.6);
  }
  *{box-sizing:border-box}
  html{-webkit-text-size-adjust:100%}
  body{
    margin:0; min-height:100vh;
    background:linear-gradient(160deg,#0F172A 0%,#1E293B 50%,#0F172A 100%); background-attachment:fixed;
    color:var(--slate-200); font-family:var(--sans); font-size:16px; line-height:1.55;
  }
  .wrap{max-width:760px; margin:0 auto; padding:18px 16px 64px}
  a{color:var(--emerald-400)}

  /* header */
  header.site{display:flex; align-items:center; justify-content:space-between; gap:12px; padding:4px 2px 20px}
  .brand-wrap{display:flex; align-items:center; gap:11px}
  .brand-chip{width:38px; height:38px; border-radius:11px; background:rgba(16,185,129,.16); display:grid; place-items:center; flex:0 0 auto}
  .brand-chip svg{width:21px; height:21px; color:var(--emerald-400)}
  .brand{font-weight:700; font-size:18px; color:var(--white); letter-spacing:-.01em; line-height:1.1}
  .brand .prep{color:var(--emerald-400)}
  .brand small{display:block; font-weight:600; font-size:11.5px; color:var(--emerald-400); letter-spacing:.02em; margin-top:1px}
  .exam-badge{font-size:12px; font-weight:700; color:var(--emerald-400); background:rgba(16,185,129,.14);
    border:1px solid rgba(16,185,129,.3); padding:5px 11px; border-radius:999px}

  h1{font-size:25px; line-height:1.15; margin:0 0 6px; color:var(--white); font-weight:700; letter-spacing:-.01em}
  h2{font-size:18px; margin:0 0 6px; color:var(--white); font-weight:700}
  .lead{color:var(--slate-400); margin:0 0 18px}

  /* cards */
  .hdr-right{display:flex; align-items:center; gap:12px}
  .acct{display:flex; align-items:center; gap:8px}
  .acct-email{font-size:12px; color:var(--slate-400); max-width:150px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap}
  .acct-btn{font:inherit; font-size:12px; font-weight:700; padding:6px 12px; border-radius:9px; border:1.5px solid var(--card-border); background:rgba(30,41,59,.6); color:var(--slate-200); cursor:pointer}
  .acct-btn.primary{border-color:var(--emerald-400); background:rgba(16,185,129,.16); color:var(--emerald-400)}
  .modal-bg{position:fixed; inset:0; background:rgba(2,6,23,.72); display:none; place-items:center; z-index:50; padding:20px}
  .modal-bg.open{display:grid}
  .modal{background:var(--slate-900); border:1px solid var(--card-border); border-radius:16px; padding:24px; max-width:380px; width:100%; position:relative; box-shadow:0 24px 60px rgba(0,0,0,.5)}
  .modal h2{margin:0 0 4px; font-size:20px}
  .modal-sub{font-size:13px; color:var(--slate-400); margin:0 0 16px}
  .modal input{width:100%; font:inherit; padding:11px 13px; border:1.5px solid var(--card-border); border-radius:10px; background:rgba(30,41,59,.6); color:var(--white); margin-bottom:10px; box-sizing:border-box}
  .modal .btn{width:100%}
  .modal-x{position:absolute; top:10px; right:14px; background:none; border:none; color:var(--slate-400); font-size:24px; cursor:pointer; line-height:1}
  .modal-foot{font-size:13px; color:var(--slate-400); text-align:center; margin:14px 0 0}
  .modal-foot a{color:var(--emerald-400); text-decoration:none}
  .auth-err{color:var(--red-400); font-size:13px; min-height:18px; margin-bottom:4px}
  .card{background:var(--card); border:1px solid var(--card-border); border-radius:var(--r-xl); padding:18px 20px}
  .stack > * + *{margin-top:14px}

  /* badges */
  .badge{display:inline-block; font-size:11.5px; font-weight:700; letter-spacing:.03em; padding:4px 10px; border-radius:999px; text-transform:uppercase}
  .b-emerald{color:var(--emerald-400); background:rgba(16,185,129,.15)}
  .b-blue{color:var(--blue-400); background:rgba(59,130,246,.15)}
  .b-amber{color:var(--amber-400); background:rgba(245,158,11,.15)}
  .b-red{color:var(--red-400); background:rgba(239,68,68,.15)}
  .b-purple{color:var(--purple-400); background:rgba(139,92,246,.15)}
  .b-slate{color:var(--slate-300); background:rgba(51,65,85,.5)}
  .chips{display:flex; gap:8px; flex-wrap:wrap}

  /* mode toggle (dashboard) */
  .mode-grid{display:grid; gap:12px}
  @media(min-width:560px){ .mode-grid{grid-template-columns:1fr 1fr} }
  .mode-card{display:flex; flex-direction:column; gap:6px; text-align:left; cursor:pointer; font:inherit; color:inherit;
    background:var(--card); border:1.5px solid var(--card-border); border-radius:var(--r-lg); padding:16px 18px; transition:.15s}
  .mode-card:hover{border-color:var(--slate-600)}
  .mode-card.sel{border-color:var(--emerald); background:rgba(16,185,129,.08)}
  .mc-head{font-weight:700; color:var(--white); font-size:15px; display:flex; align-items:center; gap:8px; flex-wrap:wrap}
  .mc-desc{color:var(--slate-400); font-size:14px; line-height:1.45}
  .mc-sel{font-size:12px; font-weight:700; color:var(--slate-500); margin-top:2px}
  .mode-card.sel .mc-sel{color:var(--emerald-400)}

  /* session stats */
  .stats{display:grid; grid-template-columns:repeat(3,1fr); gap:10px; text-align:center}
  .stat-num{font-size:26px; font-weight:800; color:var(--white); line-height:1}
  .stat-lbl{font-size:12px; color:var(--slate-400); margin-top:3px}

  /* difficulty filter */
  .filter{display:flex; gap:8px; flex-wrap:wrap; align-items:center; margin:0 2px 16px}
  .filter .flabel{font-size:13px; color:var(--slate-400); margin-right:2px}
  .fbtn{cursor:pointer; font:inherit; font-size:13px; font-weight:600; border-radius:999px; padding:6px 14px;
    border:1px solid var(--card-border); background:rgba(51,65,85,.4); color:var(--slate-300); transition:.15s}
  .fbtn:hover{background:rgba(51,65,85,.7)}
  .fbtn[aria-pressed="true"]{background:var(--emerald); color:#04261C; border-color:var(--emerald)}

  /* case list */
  .case-btn{display:block; width:100%; text-align:left; cursor:pointer; font:inherit; color:inherit;
    background:var(--card); border:1px solid var(--card-border); border-radius:var(--r-lg);
    padding:16px 18px; margin-bottom:12px; transition:border-color .15s, transform .12s}
  .case-btn:hover{border-color:rgba(16,185,129,.5); transform:translateY(-1px)}
  .case-btn .row-top{display:flex; align-items:center; justify-content:space-between; gap:10px}
  .case-btn .t{font-size:17px; font-weight:700; color:var(--white); margin-top:10px; display:block}
  .chev{color:var(--slate-400); font-size:20px; flex:0 0 auto; line-height:1}

  /* vignette */
  .vignette .seg{margin-top:15px}
  .vignette .seg:first-child{margin-top:0}
  .seg-label{font-size:12px; font-weight:700; letter-spacing:.05em; text-transform:uppercase; margin-bottom:4px}
  .seg-intake{color:var(--emerald-400)} .seg-s1{color:var(--blue-400)} .seg-s2{color:var(--amber-400)}
  .seg-text{color:var(--slate-200); line-height:1.62}

  /* diagnosis banner (purple) */
  .dx{background:rgba(139,92,246,.13); border:1px solid rgba(139,92,246,.32); border-radius:var(--r-lg); padding:13px 15px}
  .dx .seg-label{color:var(--purple-400)}
  .dx .dx-name{font-size:17px; font-weight:700; color:var(--white)}
  .dx .dx-code{color:var(--slate-400); font-weight:500; font-size:14px}

  /* progress */
  .progress{display:flex; align-items:center; justify-content:space-between; margin:22px 2px 8px; font-size:13px; font-weight:600; color:var(--slate-400)}
  .bar{height:8px; background:var(--slate-700); border-radius:999px; overflow:hidden; margin:0 2px}
  .bar > i{display:block; height:100%; background:var(--emerald); transition:width .25s}

  /* question + options */
  .qstem{font-size:18px; line-height:1.4; margin:12px 0 16px; color:var(--white); font-weight:600}
  .opt{display:flex; gap:12px; align-items:flex-start; width:100%; text-align:left; cursor:pointer; font:inherit; color:inherit;
    background:rgba(30,41,59,.5); border:1.5px solid var(--card-border); border-radius:var(--r-md);
    padding:13px 15px; margin-bottom:10px; transition:border-color .15s, background .15s}
  .opt:hover:not(:disabled){border-color:var(--slate-600); background:rgba(30,41,59,.85)}
  .opt:disabled{cursor:default}
  .opt .key{flex:0 0 auto; width:28px; height:28px; border-radius:8px; background:var(--slate-700); color:var(--slate-300);
    display:grid; place-items:center; font-weight:700; font-size:14px}
  .opt .otext{flex:1}
  .opt .mark{margin-left:8px; font-weight:700; flex:0 0 auto}
  .opt.correct{border-color:rgba(16,185,129,.55); background:rgba(16,185,129,.13)}
  .opt.incorrect{border-color:rgba(239,68,68,.5); background:rgba(239,68,68,.12)}
  .opt.dim{opacity:.5}
  .opt.correct .key{background:var(--emerald); color:#04261C}
  .opt.incorrect .key{background:var(--red-600); color:#fff}
  .opt.correct .mark{color:var(--emerald-400)}
  .opt.incorrect .mark{color:var(--red-400)}
  .opt-weight{font-size:12.5px; font-weight:700; margin-top:6px}
  .w-pos{color:var(--emerald-400)} .w-neg{color:var(--red-400)} .w-zero{color:var(--slate-400)}

  /* feedback */
  .opt.picked{border-color:var(--blue-400); background:rgba(96,165,250,.10)}
  .sec-head{font-size:11.5px; font-weight:700; letter-spacing:.04em; text-transform:uppercase; color:var(--emerald-400); margin-bottom:10px}
  .feedback{margin-top:8px}
  .verdict{font-weight:700; font-size:16px; margin-bottom:6px}
  .verdict.ok{color:var(--emerald-400)} .verdict.no{color:var(--red-400)}
  .fb-block{margin-top:12px}
  .fb-label{font-size:11.5px; font-weight:700; letter-spacing:.05em; text-transform:uppercase; color:var(--slate-400); margin-bottom:3px}
  .fb-block strong{color:var(--white)}
  .fb-list{margin:4px 0 0; padding-left:20px}
  .fb-list li{margin:3px 0}
  .mistake{background:rgba(239,68,68,.1); border-left:3px solid var(--red); padding:9px 12px; border-radius:0 8px 8px 0}
  .mistake .fb-label{color:var(--red-400)}

  /* evidence — the signature element */
  .sources{margin-top:14px}
  .source{display:flex; gap:10px; align-items:flex-start; background:rgba(245,158,11,.1);
    border:1px solid rgba(245,158,11,.28); border-radius:9px; padding:10px 12px; margin-top:8px}
  .source .src-name{font-weight:700; color:var(--amber-400); font-size:12.5px; white-space:nowrap}
  .source .src-detail{font-size:14px; color:var(--slate-200)}

  /* buttons */
  .btn{display:inline-flex; align-items:center; justify-content:center; gap:8px; cursor:pointer; font:inherit; font-weight:700;
    background:var(--emerald); color:#04261C; border:none; border-radius:var(--r-md); padding:13px 22px; transition:background .15s}
  .btn:hover{background:var(--emerald-400)}
  .btn.secondary{background:rgba(51,65,85,.5); color:var(--slate-200)}
  .btn.secondary:hover{background:rgba(51,65,85,.85)}
  .row{display:flex; gap:10px; flex-wrap:wrap; margin-top:18px}
  .back{background:none; border:none; cursor:pointer; font:inherit; color:var(--slate-400); font-weight:600; padding:6px 0; margin-bottom:8px}
  .back:hover{color:var(--white)}

  /* results */
  .score-card{text-align:center; border-radius:var(--r-xl); padding:26px 20px; border:1px solid}
  .score-card.pass{background:rgba(16,185,129,.1); border-color:rgba(16,185,129,.3)}
  .score-card.partial{background:rgba(245,158,11,.1); border-color:rgba(245,158,11,.3)}
  .score-icon{font-size:34px; line-height:1; margin-bottom:6px}
  .score-big{font-size:42px; font-weight:800; color:var(--white); line-height:1}
  .score-sub{color:var(--slate-300); margin-top:6px}
  .summary-row{display:flex; align-items:center; gap:10px; padding:9px 0; border-bottom:1px solid var(--card-border); font-size:14px}
  .summary-row:last-child{border-bottom:none}
  .summary-row .sm-mark{flex:0 0 auto; font-weight:700}
  .summary-row .sm-mark.ok{color:var(--emerald-400)} .summary-row .sm-mark.no{color:var(--red-400)}
  .summary-row .sm-dom{flex:1; color:var(--slate-300)}
  .dom-row{display:flex; align-items:center; justify-content:space-between; padding:9px 0; border-bottom:1px solid var(--card-border); font-size:15px; color:var(--slate-200)}
  .dom-row:last-child{border-bottom:none}
  .dom-score{font-weight:700; color:var(--white)}

  .hint{font-size:13px; color:var(--slate-500); margin-top:18px; text-align:center}

  /* accessibility */
  :focus-visible{outline:2.5px solid var(--emerald-400); outline-offset:2px; border-radius:6px}
  .sr-only{position:absolute; width:1px; height:1px; padding:0; margin:-1px; overflow:hidden; clip:rect(0 0 0 0); border:0}
  @media (prefers-reduced-motion:reduce){*{transition:none !important}}
  @media (max-width:520px){ h1{font-size:22px} .wrap{padding:16px 14px 56px} .card{padding:16px} }

  /* readiness dashboard */
  .ready-ring{position:relative;width:120px;height:120px;margin:0 auto 8px}
  .ready-ring svg{transform:rotate(-90deg)}
  .ready-ring .rlabel{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
  .ready-ring .rnum{font-size:28px;font-weight:800;color:var(--white);line-height:1}
  .ready-ring .rtag{font-size:11px;color:var(--slate-400);margin-top:2px}
  .dom-bar-wrap{margin:6px 0}
  .dom-bar-label{display:flex;justify-content:space-between;font-size:13px;margin-bottom:3px}
  .dom-bar-label span:first-child{color:var(--slate-300)}
  .dom-bar-label span:last-child{font-weight:700;color:var(--white)}
  .dom-bar{height:8px;background:var(--slate-700);border-radius:999px;overflow:hidden}
  .dom-bar > i{display:block;height:100%;border-radius:999px;transition:width .4s}
  .weak-tag{display:inline-block;font-size:12px;font-weight:700;color:var(--amber-400);background:rgba(245,158,11,.15);padding:4px 10px;border-radius:999px;margin:2px 4px 2px 0}
  .hero{background:linear-gradient(135deg,rgba(16,185,129,.12),rgba(59,130,246,.08));border:1px solid rgba(16,185,129,.25);border-radius:var(--r-xl);padding:22px 24px;margin-bottom:16px;text-align:center}
  .hero h2{color:var(--emerald-400);margin-bottom:6px}
  .hero .lead{margin-bottom:14px}
  .guar-link{display:inline-flex;align-items:center;gap:6px;font-size:13px;color:var(--emerald-400);text-decoration:none;margin-top:8px}
  .guar-link:hover{text-decoration:underline}
</style>

<script>

let DATA_SOURCE = 'embedded';

// ---- data layer (API with embedded fallback) ----
// Attach the signed-in user's JWT (same key register.html sets) so paying
// users get the full case bank instead of the 5-case free cap.
function authHeaders(){
  try{ const t = localStorage.getItem('prp_token'); return t ? { Authorization: 'Bearer ' + t } : {}; }
  catch(_){ return {}; }
}
async function fetchList(){
  try{
    const r = await fetch('/api/content?exam=ncmhce', { headers: authHeaders() });
    if(!r.ok) throw 0;
    const j = await r.json();
    if(!j.items || !j.items.length) throw 0;
    DATA_SOURCE = 'api';
    return j.items;
  }catch(_){
    DATA_SOURCE = 'embedded';
    return EMBEDDED_CASES.map(c => ({externalId:c.id, title:c.title, category:c.category, difficulty:c.difficulty}));
  }
}
async function fetchCase(externalId){
  if(DATA_SOURCE === 'api'){
    const r = await fetch('/api/content/' + encodeURIComponent(externalId), { headers: authHeaders() });
    const j = await r.json();
    CASE_EXAM_ID = (j.item && j.item.examId) || null;
    CASE_ITEM_ID = (j.item && j.item._id) || null;
    return j.item.caseSim;
  }
  CASE_EXAM_ID = null; CASE_ITEM_ID = null;
  return EMBEDDED_CASES.find(c => c.id === externalId);
}

const cap = s => s ? s.charAt(0).toUpperCase()+s.slice(1) : s;
function refsFor(caseObj, ids){
  const map = {}; (caseObj.references||[]).forEach(r => map[r.id]=r);
  return (ids||[]).map(id => map[id]).filter(Boolean);
}
function shuffle(a){ for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; } return a; }

// ---- NCMHCE case sections (2022+ format: one case unfolds across 3 sections) ----
const SECTIONS = [
  { id:'assessment', title:'Assessment & Conceptualization', domains:['intake','core'] },
  { id:'planning',   title:'Treatment Planning',             domains:['treatment'] },
  { id:'process',    title:'Counseling & Ethics',            domains:['counseling','ethics'] },
];
const DOMAIN_SECTION = {};
SECTIONS.forEach((s,i) => s.domains.forEach(d => { DOMAIN_SECTION[d] = i; }));
function secIndex(d){ return (d in DOMAIN_SECTION) ? DOMAIN_SECTION[d] : SECTIONS.length-1; }
function presentSections(){
  const seen = [];
  (CASE && CASE.questions || []).forEach(q => { const s = secIndex(q.domain); if(!seen.includes(s)) seen.push(s); });
  return seen.sort((a,b) => a-b);
}

// ---- localStorage history & readiness ----
const HISTORY_KEY = 'prp_history';
function loadHistory(){ try{ return JSON.parse(localStorage.getItem(HISTORY_KEY)) || []; }catch(_){ return []; } }
function saveHistory(h){ localStorage.setItem(HISTORY_KEY, JSON.stringify(h)); }

function saveToHistory(caseObj, answers, dxCorrect){
  const h = loadHistory();
  const domains = {};
  caseObj.questions.forEach((q,i) => {
    const a = answers[i];
    const chosen = a && q.options.find(o=>o.id===a.chosenId);
    const isOk = chosen && chosen.isCorrect;
    const d = q.domain || 'general';
    if(!domains[d]) domains[d] = {ok:0,total:0};
    domains[d].total++;
    if(isOk) domains[d].ok++;
  });
  const correct = Object.values(domains).reduce((s,d)=>s+d.ok,0);
  const total = Object.values(domains).reduce((s,d)=>s+d.total,0);
  h.push({
    caseId: caseObj.id || caseObj.title,
    date: Date.now(),
    correct, total, domains,
    dxCorrect: typeof dxCorrect === 'boolean' ? dxCorrect : null,
    difficulty: caseObj.difficulty || 'medium',
  });
  // keep last 500 entries
  if(h.length > 500) h.splice(0, h.length - 500);
  saveHistory(h);
}

// ---- server-side progress sync (signed-in users) ----
// Backend already exists: POST/GET /api/progress (routes/progress.js, Attempt model).
// Logged out → localStorage only, exactly as before. Logged in → the account's
// saved attempts are the source of truth, so readiness/study-plan follow you across devices.
function attemptToEntry(att){
  const db = att.domainBreakdown || {};
  let correct = 0, total = 0; const domains = {};
  Object.keys(db).forEach(d => {
    const v = db[d] || {};
    const ok = +v.ok || 0, tot = +v.total || 0;
    domains[d] = { ok, total: tot };
    correct += ok; total += tot;
  });
  return {
    caseId: att.externalId || att.contentItemId || 'case',
    date: +new Date(att.completedAt || att.createdAt || Date.now()),
    correct, total, domains,
    dxCorrect: null,
    difficulty: 'medium',
  };
}

async function hydrateFromServer(){
  if(!authHeaders().Authorization) return false; // signed-in only
  try{
    const r = await fetch('/api/progress', { headers: authHeaders() });
    if(!r.ok) return false;
    const j = await r.json();
    const entries = (j.attempts || []).map(attemptToEntry).filter(e => e.total > 0);
    if(!entries.length) return false; // empty account: keep local, don't wipe it
    entries.sort((a,b) => a.date - b.date);
    saveHistory(entries.slice(-500));
    return true;
  }catch(_){ return false; }
}

function serverSaveAttempt(caseObj, ans, domainsObj, pct){
  if(!authHeaders().Authorization || !CASE_EXAM_ID) return; // need login + a real exam id
  const responses = (caseObj.questions || []).map((q,i) => {
    const a = ans[i];
    const chosen = a && q.options.find(o => o.id === a.chosenId);
    return {
      questionId: q.id,
      selectedOptionId: a ? a.chosenId : null,
      correct: !!(chosen && chosen.isCorrect),
      weight: chosen && typeof chosen.weight === 'number' ? chosen.weight : 0,
    };
  });
  // Fire-and-forget: local history is already saved, so the UI never waits on this.
  fetch('/api/progress', {
    method: 'POST',
    headers: Object.assign({'Content-Type':'application/json'}, authHeaders()),
    body: JSON.stringify({
      examId: CASE_EXAM_ID,
      contentItemId: CASE_ITEM_ID || undefined,
      externalId: caseObj.id,
      mode: EXAM_FB ? 'timed' : 'study',
      responses,
      score: pct,
      domainBreakdown: domainsObj,
      completedAt: new Date().toISOString(),
    }),
  }).catch(()=>{});
}

// NCMHCE domain weights (approximate from NBCC content outline)
const DOMAIN_WEIGHTS = { counseling: 0.28, intake: 0.25, treatment: 0.22, ethics: 0.15, core: 0.10 };

function computeReadiness(){
  const h = loadHistory();
  if(!h.length) return null;

  // Aggregate domain stats across all history
  const agg = {};
  let totalCases = h.length;
  let totalCorrect = 0, totalQs = 0;
  let dxCorrectCount = 0, dxTotal = 0;

  h.forEach(entry => {
    totalCorrect += entry.correct || 0;
    totalQs += entry.total || 0;
    if(entry.dxCorrect !== null && entry.dxCorrect !== undefined){ dxTotal++; if(entry.dxCorrect) dxCorrectCount++; }
    Object.entries(entry.domains || {}).forEach(([d, v]) => {
      if(!agg[d]) agg[d] = {ok:0,total:0};
      agg[d].ok += v.ok;
      agg[d].total += v.total;
    });
  });

  // Domain accuracy rates
  const domainScores = {};
  Object.entries(agg).forEach(([d, v]) => {
    domainScores[d] = v.total ? Math.round(v.ok / v.total * 100) : 0;
  });

  // Weighted composite readiness
  let weightedSum = 0, weightTotal = 0;
  Object.entries(DOMAIN_WEIGHTS).forEach(([d, w]) => {
    if(agg[d] && agg[d].total >= 1){
      weightedSum += (agg[d].ok / agg[d].total) * w;
      weightTotal += w;
    }
  });

  // Volume factor: more cases = more confidence in the score
  // 0 cases = 0 multiplier, 20+ cases = 1.0 multiplier
  const volumeFactor = Math.min(1, totalCases / 20);

  // Recency boost: if last 5 attempts average > overall, slight bump
  const recent = h.slice(-5);
  let recentPct = 0;
  if(recent.length){
    const rc = recent.reduce((s,e)=>s+e.correct,0);
    const rt = recent.reduce((s,e)=>s+e.total,0);
    recentPct = rt ? rc/rt*100 : 0;
  }
  const overallPct = totalQs ? totalCorrect/totalQs*100 : 0;
  const recencyBoost = recentPct > overallPct ? Math.min(5, (recentPct - overallPct) * 0.3) : 0;

  const rawReadiness = weightTotal ? (weightedSum / weightTotal) * 100 : overallPct;
  const readiness = Math.min(99, Math.round(rawReadiness * volumeFactor + recencyBoost));

  // Find weakest domains (below 60%)
  const weakDomains = Object.entries(domainScores)
    .filter(([d,s]) => agg[d].total >= 2 && s < 60)
    .sort((a,b) => a[1] - b[1])
    .map(([d,s]) => ({domain:d, score:s}));

  // Readiness label
  let label = 'Keep practicing';
  if(readiness >= 85) label = 'Exam ready';
  else if(readiness >= 70) label = 'Almost there';
  else if(readiness >= 50) label = 'Building momentum';

  return {
    readiness, label, totalCases, totalCorrect, totalQs, overallPct: Math.round(overallPct),
    domainScores, agg, weakDomains,
    dxAccuracy: dxTotal ? Math.round(dxCorrectCount/dxTotal*100) : null,
    recentTrend: recentPct > overallPct ? 'up' : recentPct < overallPct - 5 ? 'down' : 'steady',
  };
}

function modeCard(m, title, desc, tag){

  return '<button class="mode-card'+(sel?' sel':'')+'" aria-pressed="'+sel+'" onclick="setMode(\''+m+'\')">'
       + '<span class="mc-head">'+title+(tag?' <span class="badge b-amber">'+tag+'</span>':'')+'</span>'
       + '<span class="mc-desc">'+desc+'</span>'
       + '<span class="mc-sel">'+(sel?'● Selected':'Tap to select')+'</span></button>';
}
function setMode(m){ MODE = m; showDashboard(); }
function setExamFb(v){ EXAM_FB = !!v; showDashboard(); }
function goCases(){ renderList(); window.scrollTo({top:0,behavior:'smooth'}); }

// ---- case list ----

function setFilter(d){ LIST_FILTER=d; renderList(); }

// ---- a case ----
async function startCase(externalId){
  app.innerHTML = '<p class="lead">Loading…</p>';
  CASE = await fetchCase(externalId);
  CASE.questions.forEach(q => { q._opts = shuffle(q.options.slice()); });
  // Order the case into the three NCMHCE sections (stable within each section)
  CASE.questions = CASE.questions
    .map((q, idx) => ({ q, idx, s: secIndex(q.domain) }))
    .sort((a, b) => a.s - b.s || a.idx - b.idx)
    .map(x => x.q);
  qi = 0; answers = []; dxChoice = null;
  const hasDx = Array.isArray(CASE.differentialOptions) && CASE.differentialOptions.length > 0;
  phase = (MODE==='classic' && hasDx) ? 'diagnose' : 'answer';
  renderCase();
}

function renderCase(){
  const c = CASE, n = c.questions.length;
  const dx = c.diagnosis || c.primaryDiagnosis || {};
  const hideDx = (MODE==='classic' && phase==='diagnose');
  let h = '<button class="back" onclick="goCases()">‹ All cases</button>';
  h += '<h1>'+esc(c.title)+'</h1>';
  h += '<div class="chips" style="margin-bottom:16px">'
     + '<span class="badge '+diffBadgeClass((c.difficulty||'').toLowerCase())+'">'+esc(cap(c.difficulty||''))+'</span>'
     + (c.category ? '<span class="badge b-slate">'+esc(c.category)+'</span>' : '')
     + '<span class="badge '+(MODE==='classic'?'b-blue':'b-emerald')+'">'+(MODE==='classic'?'Classic':'New format')+'</span></div>';

  // vignette
  h += '<div class="card stack"><div class="vignette">';
  const seg = (cls,label,txt) => txt ? '<div class="seg"><div class="seg-label '+cls+'">'+label+'</div><div class="seg-text">'+esc(txt)+'</div></div>' : '';
  h += seg('seg-intake','Intake', c.narrative && c.narrative.intake);
  h += seg('seg-s1','Session 1', c.narrative && c.narrative.session1);
  h += seg('seg-s2','Session 2', c.narrative && c.narrative.session2);
  h += '</div>';
  if(dx.name && !hideDx){
    h += '<div class="dx"><div class="seg-label">Working diagnosis</div>'
       + '<div class="dx-name">'+esc(dx.name)+(dx.code?' <span class="dx-code">('+esc(dx.code)+')</span>':'')+'</div></div>';
  }
  h += '</div>';

  // classic: diagnose first
  if(MODE==='classic' && phase==='diagnose'){
    h += '<div style="margin-top:14px">'+renderDiagnosis()+'</div>';
    app.innerHTML = h;
    return;
  }

  // answer phase
  const answered = answers.filter(a=>a).length;
  h += '<div class="progress"><span>Question '+(qi+1)+' of '+n+'</span><span>'+answered+'/'+n+' answered</span></div>';
  h += '<div class="bar"><i style="width:'+Math.round((qi)/(n)*100)+'%"></i></div>';
  h += '<div class="card" style="margin-top:14px">'+renderQuestion(qi)+'</div>';
  app.innerHTML = h;
}

// ---- classic: diagnosis decision ----
function renderDiagnosis(){
  const c = CASE;
  const opts = c.differentialOptions || [];
  const letters = ['A','B','C','D','E','F'];
  let h = '<div class="card"><div style="margin-bottom:8px"><span class="badge b-purple">Diagnosis</span></div>';
  h += '<div class="qstem">Based on the presentation, what is the MOST likely primary diagnosis?</div>';
  opts.forEach((o,idx) => {
    let cls='opt', mark='', dis='';
    if(dxChoice){
      dis='disabled';
      if(o.isCorrect){ cls+=' correct'; mark='<span class="mark" aria-hidden="true">✓</span>'; }
      else if(o.id===dxChoice){ cls+=' incorrect'; mark='<span class="mark" aria-hidden="true">✗</span>'; }
      else cls+=' dim';
    }
    h += '<button class="'+cls+'" '+dis+' onclick="chooseDx(\''+esc(o.id)+'\')">'
       + '<span class="key" aria-hidden="true">'+letters[idx]+'</span>'
       + '<span class="otext">'+esc(o.name)+'</span>'+mark+'</button>';
  });
  if(dxChoice){
    const corr = opts.find(o=>o.isCorrect);
    const ok = corr && dxChoice===corr.id;
    h += '<div class="feedback" role="status">';
    h += '<div class="verdict '+(ok?'ok':'no')+'">'+(ok?'✓ Correct':'✗ Not quite')+'</div>';
    if(!ok && corr) h += '<div class="fb-block"><div class="fb-label">Most likely diagnosis</div><strong>'+esc(corr.name)+'</strong></div>';
    if(c.diagnosticRationale) h += '<div class="fb-block"><div class="fb-label">Why</div>'+esc(c.diagnosticRationale)+'</div>';
    h += '<div class="row"><button class="btn" onclick="toAnswers()">Continue to questions ›</button></div>';
    h += '</div>';
  }
  h += '</div>';
  return h;
}
function chooseDx(id){
  if(dxChoice) return;
  dxChoice = id;
  const corr = (CASE.differentialOptions||[]).find(o=>o.isCorrect);
  SESSION.total++; if(corr && id===corr.id) SESSION.correct++;
  renderCase();
  const fb = app.querySelector('.feedback');
  if(fb){ fb.setAttribute('tabindex','-1'); fb.focus(); }
}
function toAnswers(){ phase='answer'; qi=0; renderCase(); window.scrollTo({top:0,behavior:'smooth'}); }

// ---- questions ----
function renderQuestion(i){
  const q = CASE.questions[i];
  const ans = answers[i]; // {chosenId}
  const letters = ['A','B','C','D','E','F'];
  const opts = q._opts || q.options;
  let h = '';
  const _present = presentSections();
  const _sIdx = secIndex(q.domain);
  const _sec = SECTIONS[_sIdx];
  h += '<div class="sec-head">Section '+(_present.indexOf(_sIdx)+1)+' of '+_present.length+' · '+esc(_sec.title)+'</div>';
  if(q.domain) h += '<div style="margin-bottom:8px"><span class="badge '+domBadgeClass(q.domain)+'">'+esc(q.domain)+'</span></div>';
  h += '<div class="qstem">'+esc(q.question)+'</div>';

  opts.forEach((o,idx) => {
    let cls = 'opt';
    let mark = '';
    let disabled = '';
    let weightHtml = '';
    if(ans){
      disabled = 'disabled';
      if(EXAM_FB){
        if(o.id === ans.chosenId){ cls += ' picked'; }
        else { cls += ' dim'; }
      } else {
        if(o.isCorrect){ cls += ' correct'; mark = '<span class="mark" aria-hidden="true">✓</span>'; }
        else if(o.id === ans.chosenId){ cls += ' incorrect'; mark = '<span class="mark" aria-hidden="true">✗</span>'; }
        else { cls += ' dim'; }
        if(typeof o.weight === 'number'){
          weightHtml = '<div class="opt-weight '+weightClass(o.weight)+'">'+weightText(o.weight)+' pts</div>';
        }
      }
    }
    h += '<button class="'+cls+'" '+disabled+' onclick="choose(\''+esc(q.id)+'\',\''+esc(o.id)+'\')">'
       + '<span class="key" aria-hidden="true">'+letters[idx]+'</span>'
       + '<span class="otext">'+esc(o.text)+weightHtml+'</span>'+mark+'</button>';
  });

  if(ans) h += EXAM_FB ? renderExamLock() : renderFeedback(q, ans);
  return h;
}

function renderExamLock(){
  const last = qi === CASE.questions.length-1;
  let h = '<div class="feedback" role="status">';
  h += '<div style="color:var(--slate-400);font-size:14px">Answer locked. Feedback comes after you finish the case — like the real exam.</div>';
  h += '<div class="row">';
  if(last) h += '<button class="btn" onclick="finish()">See results</button>';
  else h += '<button class="btn" onclick="next()">Next question ›</button>';
  h += '</div></div>';
  return h;
}

function renderFeedback(q, ans){
  const chosen = q.options.find(o=>o.id===ans.chosenId);
  const correct = q.options.find(o=>o.isCorrect);
  const ok = chosen && chosen.isCorrect;
  const ex = (ok ? chosen : correct).explanation || {};
  const sources = refsFor(CASE, q.evidenceRef);

  let h = '<div class="feedback" role="status">';
  h += '<div class="verdict '+(ok?'ok':'no')+'">'+(ok?'✓ Correct':'✗ Not quite')+'</div>';

  if(!ok && chosen){
    h += '<div class="fb-block"><div class="fb-label">Why that one misleads</div>'+esc(chosen.rationale)+'</div>';
    h += '<div class="fb-block"><div class="fb-label">The keyed answer</div><strong>'+esc(correct.text)+'</strong></div>';
  }
  if(ex.approach) h += '<div class="fb-block"><div class="fb-label">Approach</div>'+esc(ex.approach)+'</div>';
  if(ex.rationale) h += '<div class="fb-block"><div class="fb-label">Why</div>'+esc(ex.rationale)+'</div>';
  if(ex.keyIndicators && ex.keyIndicators.length){
    h += '<div class="fb-block"><div class="fb-label">Key indicators</div><ul class="fb-list">'
       + ex.keyIndicators.map(k=>'<li>'+esc(k)+'</li>').join('') + '</ul></div>';
  }
  if(ex.commonMistake) h += '<div class="fb-block"><div class="mistake"><div class="fb-label">Common mistake</div>'+esc(ex.commonMistake)+'</div></div>';

  if(sources.length){
    h += '<div class="sources"><div class="fb-label">Evidence</div>';
    sources.forEach(s => {
      h += '<div class="source"><span class="src-name">'+esc(s.source)+'</span><span class="src-detail">'+esc(s.detail)+'</span></div>';
    });
    h += '</div>';
  }

  const last = qi === CASE.questions.length-1;
  h += '<div class="row">';
  if(last) h += '<button class="btn" onclick="finish()">See results</button>';
  else h += '<button class="btn" onclick="next()">Next question ›</button>';
  h += '</div></div>';
  return h;
}

function choose(qid, oid){
  if(answers[qi]) return;
  answers[qi] = {chosenId:oid};
  const picked = CASE.questions[qi].options.find(o=>o.id===oid);
  SESSION.total++; if(picked && picked.isCorrect) SESSION.correct++;
  renderCase();
  const fb = app.querySelector('.feedback');
  if(fb){ fb.setAttribute('tabindex','-1'); fb.focus(); }
}
function next(){ qi++; renderCase(); window.scrollTo({top:0,behavior:'smooth'}); }

function finish(){
  const qs = CASE.questions;
  let correct = 0, weighted = 0, possible = 0; const dom = {}; const rows = [];
  qs.forEach((q,i) => {
    const a = answers[i];
    const chosen = a && q.options.find(o=>o.id===a.chosenId);
    const isOk = chosen && chosen.isCorrect;
    if(isOk) correct++;
    if(chosen && typeof chosen.weight === 'number') weighted += chosen.weight;
    possible += 3;
    const d = q.domain || 'general';
    dom[d] = dom[d] || {ok:0,total:0};
    dom[d].total++; if(isOk) dom[d].ok++;
    rows.push({i, domain:d, isOk, weight: chosen ? (chosen.weight||0) : 0});
  });
  const pct = Math.round(correct/qs.length*100);
  const pass = pct >= 70;

  // Save to localStorage history for readiness tracking
  let dxOk = null;
  if(MODE==='classic' && Array.isArray(CASE.differentialOptions) && CASE.differentialOptions.length){
    const corr = CASE.differentialOptions.find(o=>o.isCorrect);
    dxOk = !!(dxChoice && corr && dxChoice===corr.id);
  }
  saveToHistory(CASE, answers, dxOk);
  serverSaveAttempt(CASE, answers, dom, pct); // sync to account (no-op if logged out)

  // classic diagnosis result
  let dxLine = '';
  if(MODE==='classic' && dxOk !== null){
    dxLine = '<div class="dom-row"><span>Diagnosis</span><span class="dom-score '+(dxOk?'w-pos':'w-neg')+'">'+(dxOk?'✓ Correct':'✗ Missed')+'</span></div>';
  }

  let h = '<button class="back" onclick="goCases()">‹ All cases</button>';
  h += '<h1>'+esc(CASE.title)+'</h1>';
  h += '<div class="score-card '+(pass?'pass':'partial')+'">'
     + '<div class="score-icon" aria-hidden="true">'+(pass?'🏆':'📈')+'</div>'
     + '<div class="score-big">'+pct+'%</div>'
     + '<div class="score-sub">'+correct+' of '+qs.length+' correct · weighted '+weightText(weighted)+'/'+possible+'</div></div>';

  h += '<div class="card" style="margin-top:14px"><h2>Question summary</h2>';
  rows.forEach(r => {
    h += '<div class="summary-row"><span class="sm-mark '+(r.isOk?'ok':'no')+'" aria-hidden="true">'+(r.isOk?'✓':'✗')+'</span>'
       + '<span class="sm-dom">Q'+(r.i+1)+' · '+esc(cap(r.domain))+'</span>'
       + '<span class="'+weightClass(r.weight)+'" style="font-weight:700; font-size:13px">'+weightText(r.weight)+'</span></div>';
  });
  h += '</div>';

  if(EXAM_FB){
    h += '<div class="card" style="margin-top:14px"><h2>Case review</h2>';
    h += '<div style="font-size:12px;color:var(--slate-500);margin-bottom:6px">Feedback was held until the end, like the real exam.</div>';
    qs.forEach((q,i) => {
      const a = answers[i];
      const chosen = a && q.options.find(o=>o.id===a.chosenId);
      const correctOpt = q.options.find(o=>o.isCorrect);
      const ok = !!(chosen && chosen.isCorrect);
      const ex = ((ok?chosen:correctOpt) || {}).explanation || {};
      h += '<div style="border-top:1px solid var(--card-border);padding:10px 0">';
      h += '<div style="font-weight:600;color:var(--white);font-size:14px">Q'+(i+1)+'. '+esc(q.question)+'</div>';
      h += '<div class="'+(ok?'w-pos':'w-neg')+'" style="font-weight:700;font-size:13px;margin-top:4px">'+(ok?'✓ Correct':'✗ Incorrect')+' <span style="font-weight:400;color:var(--slate-400)">— you chose: '+esc(chosen?chosen.text:'(no answer)')+'</span></div>';
      if(!ok && correctOpt) h += '<div style="font-size:13px;color:var(--slate-300);margin-top:2px">Best answer: '+esc(correctOpt.text)+'</div>';
      if(ex.rationale) h += '<div style="font-size:13px;color:var(--slate-400);margin-top:4px">'+esc(ex.rationale)+'</div>';
      if(ex.commonMistake) h += '<div style="font-size:13px;color:var(--amber-400);margin-top:4px">Common mistake: '+esc(ex.commonMistake)+'</div>';
      h += '</div>';
    });
    h += '</div>';
  }

  const secAgg = {};
  Object.keys(dom).forEach(d => {
    const si = secIndex(d);
    if(!secAgg[si]) secAgg[si] = {ok:0, total:0};
    secAgg[si].ok += dom[d].ok; secAgg[si].total += dom[d].total;
  });
  h += '<div class="card" style="margin-top:14px"><h2>By section</h2>';
  Object.keys(secAgg).map(Number).sort((a,b) => a-b).forEach(si => {
    const v = secAgg[si]; const p = v.total ? Math.round(v.ok/v.total*100) : 0;
    h += '<div class="dom-row"><span>'+esc(SECTIONS[si].title)+'</span><span class="dom-score '+(p>=70?'w-pos':'w-neg')+'">'+v.ok+'/'+v.total+' · '+p+'%</span></div>';
  });
  h += '</div>';

  h += '<div class="card" style="margin-top:14px"><h2>By area</h2>';
  h += dxLine;
  Object.keys(dom).forEach(d => {
    h += '<div class="dom-row"><span>'+esc(cap(d))+'</span><span class="dom-score">'+dom[d].ok+'/'+dom[d].total+'</span></div>';
  });
  h += '</div>';

  h += '<div class="card" style="margin-top:14px"><h2>AI clinical debrief</h2>'
     + '<div style="font-size:12px;color:var(--slate-500);margin-bottom:10px">Dr. Claire Moreau reviews your answers — strengths, growth areas, and an NCMHCE exam tip for this case.</div>'
     + '<button class="btn" id="debrief-btn" onclick="getDebrief()">Get debrief</button>'
     + '<div id="debrief-out"></div></div>';

  h += '<div class="row"><button class="btn" onclick="startCase(\''+esc(CASE.id)+'\')">Retry this case</button>'
     + '<button class="btn secondary" onclick="goCases()">More cases</button></div>';
  app.innerHTML = h;
  window.scrollTo({top:0,behavior:'smooth'});
}

async function getDebrief(){
  const btn = document.getElementById('debrief-btn');
  const out = document.getElementById('debrief-out');
  if(!btn || !out) return;
  btn.disabled = true; btn.textContent = 'Analyzing…';
  try{
    const r = await fetch('/api/debrief', {
      method:'POST',
      headers: Object.assign({'Content-Type':'application/json'}, authHeaders()),
      body: JSON.stringify({ caseData: CASE, answers, mode: MODE })
    });
    const j = await r.json().catch(()=>({}));
    if(!r.ok) throw new Error(j.error || 'Request failed');
    out.innerHTML = '<div class="feedback" style="margin-top:12px">'
      + '<div class="fb-label" style="color:var(--purple-400)">Dr. Claire Moreau — Clinical Debrief</div>'
      + '<div style="white-space:pre-wrap;color:var(--slate-200);font-size:14px;line-height:1.6;margin-top:6px">'+esc(j.debrief)+'</div>'
      + '<div style="font-size:11px;color:var(--slate-600);font-style:italic;margin-top:8px">AI-generated feedback for learning. Not a substitute for licensed supervision.</div></div>';
    btn.style.display = 'none';
  }catch(e){
    out.innerHTML = '<div style="color:var(--red-400);font-size:13px;margin-top:10px">Debrief failed: '+esc(e.message)+'</div>';
    btn.disabled = false; btn.textContent = 'Get debrief';
  }
}

// ---- study plan generator ----
function genPlan(){
  var dateEl = document.getElementById('exam-date');
  var planEl = document.getElementById('study-plan');
  if(!dateEl || !planEl) return;
  var dateVal = dateEl.value;
  if(dateVal) localStorage.setItem('prp_exam_date', dateVal);
  if(!dateVal){ planEl.innerHTML = '<p style="color:var(--slate-400);font-size:14px;margin:0">Set your exam date to generate a plan.</p>'; return; }

  var rd = computeReadiness();
  if(!rd){ planEl.innerHTML = ''; return; }

  var examDate = new Date(dateVal + 'T12:00:00');
  var now = new Date();
  var daysLeft = Math.max(1, Math.ceil((examDate - now) / 86400000));

  var domLabels = {counseling:'Counseling/Interventions',intake:'Assessment/Intake',treatment:'Treatment Planning',ethics:'Professional Ethics',core:'Core Attributes'};
  var domOrder = ['counseling','intake','treatment','ethics','core'];

  // Sort domains by weakness (lowest score first)
  var ranked = domOrder.filter(function(d){ return rd.agg[d] && rd.agg[d].total >= 1; })
    .map(function(d){ return {d:d, sc:rd.domainScores[d]||0}; })
    .sort(function(a,b){ return a.sc - b.sc; });

  var h = '<div style="font-size:14px;color:var(--slate-300)">';
  h += '<div style="font-weight:700;color:var(--white);margin-bottom:8px">' + daysLeft + ' day' + (daysLeft===1?'':'s') + ' until exam</div>';

  // Phase breakdown
  var phase1 = Math.max(1, Math.floor(daysLeft * 0.5));
  var phase2 = Math.max(1, Math.floor(daysLeft * 0.3));
  var phase3 = Math.max(1, daysLeft - phase1 - phase2);

  h += '<div style="margin:12px 0">';
  // Phase 1
  h += '<div style="display:flex;gap:10px;align-items:flex-start;margin:10px 0">';
  h += '<div style="flex:0 0 auto;width:28px;height:28px;border-radius:8px;background:rgba(59,130,246,.15);color:var(--blue-400);display:grid;place-items:center;font-weight:700;font-size:13px">1</div>';
  h += '<div style="flex:1"><strong style="color:var(--white)">Days 1–' + phase1 + ': Build foundations</strong><br>';
  h += 'Focus on your weakest areas: ';
  var weak = ranked.slice(0, 2);
  h += weak.map(function(w){ return '<strong style="color:var(--amber-400)">' + (domLabels[w.d]||w.d) + '</strong> (' + w.sc + '%)'; }).join(', ');
  h += '. Do 2–3 cases per day in these domains + 15 min flashcards.';
  h += '</div></div>';

  // Phase 2
  h += '<div style="display:flex;gap:10px;align-items:flex-start;margin:10px 0">';
  h += '<div style="flex:0 0 auto;width:28px;height:28px;border-radius:8px;background:rgba(139,92,246,.15);color:var(--purple-400);display:grid;place-items:center;font-weight:700;font-size:13px">2</div>';
  h += '<div style="flex:1"><strong style="color:var(--white)">Days ' + (phase1+1) + '–' + (phase1+phase2) + ': Full-length practice</strong><br>';
  h += 'Shift to timed full exams (10–11 cases). Simulate real conditions. Review every missed question. Continue flashcards for retention.';
  h += '</div></div>';

  // Phase 3
  h += '<div style="display:flex;gap:10px;align-items:flex-start;margin:10px 0">';
  h += '<div style="flex:0 0 auto;width:28px;height:28px;border-radius:8px;background:rgba(16,185,129,.15);color:var(--emerald-400);display:grid;place-items:center;font-weight:700;font-size:13px">3</div>';
  h += '<div style="flex:1"><strong style="color:var(--white)">Days ' + (phase1+phase2+1) + '–' + daysLeft + ': Sharpen and rest</strong><br>';
  h += 'Light review of flagged weak spots. DSM reference for any lingering gaps. Day before exam: rest, no cramming.';
  h += '</div></div>';
  h += '</div>';

  // Daily targets
  var casesPerDay = Math.max(2, Math.min(5, Math.ceil((20 - rd.totalCases) / Math.max(1, phase1))));
  h += '<div style="margin-top:12px;padding:12px;background:rgba(16,185,129,.08);border:1px solid rgba(16,185,129,.2);border-radius:10px">';
  h += '<strong style="color:var(--emerald-400)">Daily targets:</strong> ' + casesPerDay + ' cases + 15 min flashcards + 10 min DSM review';
  if(rd.totalCases < 20) h += '<br><span style="color:var(--amber-400);font-size:13px">You need ' + (20 - rd.totalCases) + ' more cases for pass guarantee eligibility</span>';
  h += '</div>';

  h += '</div>';
  planEl.innerHTML = h;
}

// ---- account / login surface ----
function currentUser(){ try{ return JSON.parse(localStorage.getItem('prp_user') || 'null'); }catch(_){ return null; } }

function renderAccount(){
  const el = document.getElementById('acct');
  if(!el) return;
  const u = currentUser();
  if(u && authHeaders().Authorization){
    const tier = (u.subscription && u.subscription.tier) || u.tier;
    const badge = (tier && tier !== 'free') ? '<span class="exam-badge" style="font-size:11px;padding:3px 8px">'+esc(cap(tier))+'</span>' : '';
    el.innerHTML = badge
      + '<span class="acct-email" title="'+esc(u.email||'')+'">'+esc(u.email||'Signed in')+'</span>'
      + '<button class="acct-btn" onclick="logout()">Log out</button>';
  } else {
    el.innerHTML = '<button class="acct-btn primary" onclick="openAuth()">Sign in</button>';
  }
}

function openAuth(){
  const m = document.getElementById('auth-modal');
  document.getElementById('auth-err').textContent = '';
  m.classList.add('open');
  const e = document.getElementById('auth-email'); if(e) e.focus();
}
function closeAuth(){ document.getElementById('auth-modal').classList.remove('open'); }

async function submitAuth(){
  const email = (document.getElementById('auth-email').value || '').trim();
  const pass = document.getElementById('auth-pass').value || '';
  const errEl = document.getElementById('auth-err');
  const btn = document.getElementById('auth-submit');
  errEl.textContent = '';
  if(!email || !pass){ errEl.textContent = 'Enter your email and password.'; return; }
  btn.disabled = true; btn.textContent = 'Signing in…';
  try{
    const r = await fetch('/api/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password: pass }),
    });
    const j = await r.json().catch(()=>({}));
    if(!r.ok) throw new Error(j.error || 'Sign in failed');
    localStorage.setItem('prp_token', j.token);
    localStorage.setItem('prp_user', JSON.stringify(j.user || { email }));
    closeAuth();
    renderAccount();
    await hydrateFromServer();   // pull this account's saved progress
    showDashboard();
  }catch(e){
    errEl.textContent = e.message;
    btn.disabled = false; btn.textContent = 'Sign in';
  }
}

function logout(){
  // Clear the session AND local history, so the next person on this browser
  // starts clean — the account's real progress is safe on the server.
  try{
    localStorage.removeItem('prp_token');
    localStorage.removeItem('prp_user');
    localStorage.removeItem('prp_history');
  }catch(_){}
  location.reload();
}

// Submit auth on Enter from either field
document.addEventListener('keydown', function(ev){
  if(ev.key === 'Enter' && document.getElementById('auth-modal').classList.contains('open')){
    const a = document.activeElement;
    if(a && (a.id === 'auth-email' || a.id === 'auth-pass')) submitAuth();
  }
});

// go
(async function init(){
  renderAccount();
  await hydrateFromServer();   // pulls account history when signed in; no-op otherwise
  showDashboard();
})();
</script>
