<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Set a new password — PassReady Prep</title>
<meta name="description" content="Set a new password for your PassReady Prep account."/>
<meta name="robots" content="noindex,nofollow"/>
<style>
  :root{
    --emerald:#10B981;--emerald-400:#34D399;--slate-900:#0F172A;--slate-800:#1E293B;
    --slate-700:#334155;--slate-600:#475569;--slate-500:#64748B;--slate-400:#94A3B8;
    --slate-300:#CBD5E1;--white:#F8FAFC;--red:#EF4444;
    --card:rgba(30,41,59,.6);--card-border:rgba(51,65,85,.6);
    --sans:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
  }
  *{box-sizing:border-box}
  body{margin:0;min-height:100vh;display:grid;place-items:center;
    background:linear-gradient(160deg,#0F172A 0%,#1E293B 50%,#0F172A 100%);
    background-attachment:fixed;font-family:var(--sans);color:var(--slate-300);padding:24px}
  .card{background:var(--card);border:1px solid var(--card-border);border-radius:20px;
    padding:40px 36px;max-width:440px;width:100%;box-shadow:0 24px 60px -20px rgba(0,0,0,.5)}
  .brand-wrap{display:flex;align-items:center;gap:10px;text-decoration:none;color:inherit;margin-bottom:28px}
  .brand-chip{width:36px;height:36px;border-radius:10px;background:rgba(16,185,129,.16);
    display:grid;place-items:center;flex:0 0 auto}
  .brand-chip svg{width:20px;height:20px;color:var(--emerald-400)}
  .brand{font-weight:700;font-size:17px;color:var(--white);letter-spacing:-.01em}
  .brand .prep{color:var(--emerald-400)}
  h1{font-size:22px;font-weight:800;color:var(--white);letter-spacing:-.02em;margin:0 0 6px}
  .sub{color:var(--slate-400);font-size:14.5px;margin:0 0 26px;line-height:1.5}
  label{display:block;font-size:12px;font-weight:700;letter-spacing:.04em;
    text-transform:uppercase;color:var(--slate-400);margin:0 0 6px}
  input[type=password]{width:100%;background:rgba(15,23,42,.55);border:1px solid var(--card-border);
    border-radius:10px;color:var(--white);font:inherit;font-size:15px;padding:11px 14px;outline:none;
    transition:border-color .15s;margin-bottom:16px}
  input:focus{border-color:var(--emerald)}
  input::placeholder{color:var(--slate-600)}
  .hint{font-size:12.5px;color:var(--slate-500);margin:-8px 0 16px}
  .btn{width:100%;background:var(--emerald);color:#04261C;border:none;border-radius:12px;
    padding:13px;font:700 15px/1 var(--sans);cursor:pointer;transition:background .15s}
  .btn:hover:not(:disabled){background:var(--emerald-400)}
  .btn:disabled{opacity:.45;cursor:not-allowed}
  .err{color:var(--red);font-size:13.5px;margin:0 0 14px;display:none;line-height:1.5}
  .ok{color:var(--emerald-400);font-size:14.5px;margin:0 0 8px;display:none;line-height:1.55}
  .switch{text-align:center;margin-top:18px;font-size:14px;color:var(--slate-500)}
  .switch a{color:var(--emerald-400);text-decoration:none;font-weight:600}
  :focus-visible{outline:2.5px solid var(--emerald-400);outline-offset:2px;border-radius:6px}
</style>
</head>
<body>
<div class="card">
  <a class="brand-wrap" href="/landing.html" aria-label="PassReady Prep home">
    <span class="brand-chip" aria-hidden="true">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21.42 10.922a1 1 0 0 0-.019-1.838L12.83 5.18a2 2 0 0 0-1.66 0L2.6 9.08a1 1 0 0 0 0 1.832l8.57 3.908a2 2 0 0 0 1.66 0z"/>
        <path d="M22 10v6"/><path d="M6 12.5V16a6 3 0 0 0 12 0v-3.5"/>
      </svg>
    </span>
    <span class="brand">PassReady <span class="prep">Prep</span></span>
  </a>

  <main id="main">
    <h1>Set a new password</h1>
    <p class="sub">Choose a new password for your account. Make it at least 8 characters.</p>

    <p class="err" id="err"></p>
    <p class="ok" id="ok"></p>

    <div id="form-area">
      <label for="pw">New password</label>
      <input type="password" id="pw" placeholder="••••••••" autocomplete="new-password"/>
      <label for="pw2">Confirm new password</label>
      <input type="password" id="pw2" placeholder="••••••••" autocomplete="new-password"/>
      <p class="hint">Setting a new password will sign you out on any other devices.</p>
      <button class="btn" id="btn" onclick="submit()">Reset password</button>
    </div>

    <div class="switch"><a href="/register.html">Back to sign in</a></div>
  </main>
</div>

<script>
  function show(id, msg){ var e=document.getElementById(id); e.textContent=msg; e.style.display='block'; }
  function hide(id){ document.getElementById(id).style.display='none'; }

  function tokenFromUrl(){
    var p = new URLSearchParams(window.location.search);
    return p.get('token') || '';
  }

  var TOKEN = tokenFromUrl();
  if(!TOKEN){
    document.getElementById('form-area').style.display='none';
    show('err','This reset link is missing its token. Please request a new link from the "Reset your password" page.');
  }

  async function submit(){
    var pw = document.getElementById('pw').value;
    var pw2 = document.getElementById('pw2').value;
    var btn = document.getElementById('btn');
    hide('err'); hide('ok');

    if(pw.length < 8){ show('err','Password must be at least 8 characters.'); return; }
    if(pw !== pw2){ show('err','The two passwords don\'t match.'); return; }

    btn.disabled = true; btn.textContent = 'Saving…';
    try{
      var r = await fetch('/api/auth/reset-password', {
        method:'POST', headers:{'content-type':'application/json'},
        body: JSON.stringify({ token: TOKEN, password: pw })
      });
      var data = await r.json().catch(function(){ return {}; });
      if(!r.ok){
        show('err', data.error || 'Could not reset your password. Please try again.');
        btn.disabled=false; btn.textContent='Reset password';
        return;
      }
      document.getElementById('form-area').style.display='none';
      show('ok', (data.message || 'Your password has been reset.') + ' Redirecting you to sign in…');
      setTimeout(function(){ window.location.href = '/register.html'; }, 2200);
    }catch(e){
      show('err','Network error. Please try again.');
      btn.disabled=false; btn.textContent='Reset password';
    }
  }

  document.getElementById('pw2').addEventListener('keydown', function(e){ if(e.key==='Enter') submit(); });
</script>
</body>
</html>
