<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>PassReady Prep — Review</title>
<style>
  :root{
    --ink:#1B2A3A; --muted:#5B6B7A;
    --primary:#0E7C7B; --primary-dark:#0A5E5D;
    --bg:#F7F5F1; --card:#FFFFFF; --border:#E5E0D8;
    --correct:#1E7F4E; --correct-bg:#E7F3EC;
    --amber:#9A6614; --amber-bg:#F6EEDD;
    --review:#9A6614; --review-bg:#F6EEDD;
    --pub:#1E7F4E; --pub-bg:#E7F3EC;
    --serif:Georgia,"Times New Roman",serif;
    --sans:system-ui,-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    --radius:12px;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);font-family:var(--sans);font-size:16px;line-height:1.55}
  .wrap{max-width:760px;margin:0 auto;padding:18px 16px 64px}
  header.site{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:6px 2px 14px}
  .brand{font-weight:700;font-size:19px}
  .brand .prep{color:var(--primary);font-weight:600}
  .tag{font-size:12px;font-weight:600;color:var(--review);background:var(--review-bg);border:1px solid #E8D9B8;padding:4px 10px;border-radius:999px}

  .card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:16px 18px;margin-bottom:12px}
  h1{font-family:var(--serif);font-size:24px;margin:0 0 4px}
  h2{font-family:var(--serif);font-size:19px;margin:0 0 8px}
  .lead{color:var(--muted);margin:0 0 16px}
  .row{display:flex;gap:10px;flex-wrap:wrap;align-items:center}

  input[type=password],input[type=text]{font:inherit;padding:11px 13px;border:1.5px solid var(--border);border-radius:10px;flex:1;min-width:200px}
  .btn{display:inline-flex;align-items:center;gap:8px;cursor:pointer;font:inherit;font-weight:600;background:var(--primary);color:#fff;border:none;border-radius:10px;padding:11px 18px}
  .btn:hover{background:var(--primary-dark)}
  .btn.pub{background:var(--pub)} .btn.pub:hover{background:#176b40}
  .btn.ghost{background:transparent;color:var(--primary-dark);border:1.5px solid var(--border)}
  .btn.ghost:hover{background:#fff;border-color:var(--primary)}
  .btn:disabled{opacity:.5;cursor:default}
  .back{background:none;border:none;cursor:pointer;font:inherit;color:var(--muted);font-weight:600;padding:6px 0;margin-bottom:4px}
  .back:hover{color:var(--ink)}

  .tabs{display:flex;gap:8px;margin:4px 0 14px}
  .tabs button{font:inherit;font-weight:600;cursor:pointer;background:#fff;border:1.5px solid var(--border);border-radius:999px;padding:7px 14px;color:var(--muted)}
  .tabs button.on{border-color:var(--primary);color:var(--primary-dark);background:#E5F0EF}

  .case-btn{display:block;width:100%;text-align:left;cursor:pointer;background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;margin-bottom:10px;font:inherit;color:inherit}
  .case-btn:hover{border-color:var(--primary)}
  .case-btn .t{font-family:var(--serif);font-size:18px;font-weight:600}
  .chips{margin-top:6px;display:flex;gap:8px;flex-wrap:wrap}
  .chip{font-size:12.5px;font-weight:600;color:var(--muted);background:#F0ECE4;border-radius:999px;padding:3px 10px}
  .status{font-size:12px;font-weight:700;border-radius:999px;padding:3px 10px}
  .status.sme_review{color:var(--review);background:var(--review-bg)}
  .status.published{color:var(--pub);background:var(--pub-bg)}
  .status.needs{color:#A4451F;background:#F6E4DA}

  .vignette{font-family:var(--serif);font-size:17px;line-height:1.6}
  .seg{margin-top:12px}
  .seg-label{font-family:var(--sans);font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--primary-dark);margin-bottom:2px}
  .dx{background:var(--amber-bg);border:1px solid #E8D9B8;border-radius:10px;padding:11px 13px;margin-top:10px}
  .dx .seg-label{color:var(--amber)}

  .q{border-top:1px solid var(--border);padding-top:14px;margin-top:14px}
  .qmeta{font-size:12px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;color:var(--muted)}
  .qstem{font-family:var(--serif);font-size:18px;margin:4px 0 10px}
  .opt{border:1.5px solid var(--border);border-radius:9px;padding:10px 12px;margin-bottom:8px}
  .opt.correct{border-color:var(--correct);background:var(--correct-bg)}
  .opt .otext{font-weight:600}
  .opt.correct .otext::after{content:" ✓";color:var(--correct)}
  .opt .orat{font-size:14px;color:var(--muted);margin-top:4px}
  .ex{margin-top:8px;font-size:14.5px}
  .ex b{font-weight:700}
  .ex ul{margin:4px 0;padding-left:20px}
  .source{display:flex;gap:10px;background:var(--amber-bg);border:1px solid #E8D9B8;border-radius:9px;padding:9px 11px;margin-top:8px}
  .source .src-name{font-weight:700;color:var(--amber);font-size:13px;white-space:nowrap}
  .source .src-detail{font-size:14px}

  .err{color:#B23A60;font-weight:600;margin-top:8px}
  .ok{color:var(--pub);font-weight:600}
  :focus-visible{outline:3px solid var(--primary);outline-offset:2px;border-radius:6px}
  @media (prefers-reduced-motion:reduce){*{transition:none!important}}

  /* generate form */
  .gen-form label{display:block;font-weight:600;font-size:14px;color:var(--muted);margin:12px 0 4px}
  .gen-form label:first-child{margin-top:0}
  .gen-form select,.gen-form input[type=password]{font:inherit;padding:10px 12px;border:1.5px solid var(--border);border-radius:10px;width:100%;background:#fff}
  .gen-form select:focus,.gen-form input:focus{border-color:var(--primary);outline:none;box-shadow:0 0 0 3px rgba(14,124,123,.15)}
  .gen-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  @media(max-width:540px){.gen-grid{grid-template-columns:1fr}}
  .gap-bar{margin-top:12px}
  .gap-row{display:flex;align-items:center;gap:8px;margin:5px 0;font-size:13px}
  .gap-row .gl{min-width:110px;font-weight:600;color:var(--ink)}
  .gap-row .gbar{flex:1;height:8px;background:var(--border);border-radius:999px;overflow:hidden}
  .gap-row .gbar i{display:block;height:100%;border-radius:999px;transition:width .3s}
  .gap-row .gn{font-size:12px;color:var(--muted);min-width:50px;text-align:right}
  .spinner{display:inline-block;width:18px;height:18px;border:2.5px solid var(--border);border-top-color:var(--primary);border-radius:50%;animation:sp .6s linear infinite;vertical-align:middle;margin-right:8px}
  @keyframes sp{to{transform:rotate(360deg)}}
  .gen-result{margin-top:14px;padding:14px 16px;border-radius:var(--radius);border:1.5px solid}
  .gen-result.success{background:var(--correct-bg);border-color:#A3D9B5}
  .gen-result.fail{background:#FDE8E8;border-color:#F5A3A3}
  .key-note{font-size:12px;color:var(--muted);margin-top:4px}
</style>
</head>
<body>
<div class="wrap">
  <header class="site">
    <div class="brand">PassReady <span class="prep">Prep</span></div>
    <span class="tag">Review</span>
  </header>
  <main id="app"></main>
</div>

<script>
let TOKEN = '';
let TAB = 'sme_review';
let BLUEPRINT = null; // loaded once from server
const app = document.getElementById('app');
const esc = s => String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const cap = s => s?s.charAt(0).toUpperCase()+s.slice(1):s;

// Persist the Anthropic API key in sessionStorage (browser tab lifetime only)
function getApiKey(){ return sessionStorage.getItem('prp_api_key')||''; }
function setApiKey(k){ sessionStorage.setItem('prp_api_key',k); }

async function api(path, opts){
  opts = opts || {};
  opts.headers = Object.assign({'x-admin-token':TOKEN,'Content-Type':'application/json'}, opts.headers||{});
  const r = await fetch(path, opts);
  if(r.status===401) throw new Error('Invalid admin token');
  if(!r.ok){ const j=await r.json().catch(()=>({})); throw new Error(j.error||('Error '+r.status)); }
  return r.json();
}

function gate(msg){
  app.innerHTML =
    '<div class="card"><h1>Reviewer sign-in</h1>'
    + '<p class="lead">Enter your admin token to review and publish cases.</p>'
    + '<div class="row"><input id="tok" type="password" placeholder="Admin token" />'
    + '<button class="btn" onclick="signIn()">Continue</button></div>'
    + (msg?'<p class="err">'+esc(msg)+'</p>':'') + '</div>';
  const i=document.getElementById('tok'); i.focus();
  i.addEventListener('keydown',e=>{ if(e.key==='Enter') signIn(); });
}
async function signIn(){
  TOKEN = document.getElementById('tok').value.trim();
  if(!TOKEN) return gate('Enter your token.');
  try{ await api('/api/admin/content?status=sme_review'); showList(); }
  catch(e){ gate(e.message); }
}

function tabsHtml(){
  return '<div class="tabs">'
    + '<button class="'+(TAB==='sme_review'?'on':'')+'" onclick="setTab(\'sme_review\')">Pending review</button>'
    + '<button class="'+(TAB==='published'?'on':'')+'" onclick="setTab(\'published\')">Published</button>'
    + '<button class="'+(TAB==='generate'?'on':'')+'" onclick="setTab(\'generate\')" style="border-color:'+(TAB==='generate'?'var(--primary)':'var(--border)')+'">⚡ Cases</button>'
    + '<button class="'+(TAB==='course'?'on':'')+'" onclick="setTab(\'course\')" style="border-color:'+(TAB==='course'?'var(--primary)':'var(--border)')+'">📄 CE Course</button>'
    + '</div>';
}

async function showList(){
  if(TAB==='generate') return showGenerate();
  if(TAB==='course') return showCourse();
  app.innerHTML = '<p class="lead">Loading…</p>';
  let data;
  try{ data = await api('/api/admin/content?status='+TAB); }
  catch(e){ return gate(e.message); }
  let h = tabsHtml();
  h += '<h1>'+(TAB==='sme_review'?'Pending review':'Published')+' <span style="color:var(--muted);font-weight:400">('+data.count+')</span></h1>';
  if(!data.count){
    h += '<p class="lead">'+(TAB==='sme_review'?'Nothing waiting. Generated cases show up here after you import or generate them.':'No published cases yet.')+'</p>';
  }
  data.items.forEach(it=>{
    h += '<button class="case-btn" onclick="openCase(\''+esc(it.externalId)+'\')">'
       + '<span class="t">'+esc(it.title)+'</span>'
       + '<span class="chips"><span class="chip">'+esc(it.category)+'</span>'
       + '<span class="chip">'+esc(cap(it.difficulty))+'</span>'
       + '<span class="status '+esc(it.status)+'">'+(it.status==='sme_review'?'Pending':'Published')+'</span>'
       + (it.needsWork?'<span class="status needs">Needs work</span>':'')
       + '</span></button>';
  });
  app.innerHTML = h;
}
function setTab(t){ TAB=t; showList(); }

// ── Generate tab ────────────────────────────────────────────────────

async function loadBlueprint(){
  if(BLUEPRINT) return BLUEPRINT;
  BLUEPRINT = await api('/api/admin/generate/blueprint');
  return BLUEPRINT;
}

async function showGenerate(){
  app.innerHTML = '<p class="lead">Loading blueprint…</p>';
  let bp, coverage;
  try{
    bp = await loadBlueprint();
    coverage = await api('/api/admin/generate/coverage');
  } catch(e){ return gate(e.message); }

  let h = tabsHtml();
  h += '<h1>Generate new case</h1>';
  h += '<p class="lead">Create an NCMHCE case via Anthropic API. It lands in Pending Review.</p>';

  // Coverage bar
  h += '<div class="card"><h2>Case bank coverage <span style="color:var(--muted);font-weight:400">'+coverage.total+' / '+coverage.target+'</span></h2>';
  h += '<div class="gap-bar">';
  coverage.gaps.forEach(g => {
    const pct = g.target ? Math.min(100, Math.round(g.have / g.target * 100)) : 100;
    const color = pct >= 100 ? 'var(--correct)' : pct >= 60 ? 'var(--amber)' : 'var(--review)';
    h += '<div class="gap-row"><span class="gl">'+esc(g.category)+'</span>'
       + '<span class="gbar"><i style="width:'+pct+'%;background:'+color+'"></i></span>'
       + '<span class="gn">'+g.have+'/'+g.target+'</span></div>';
  });
  h += '</div></div>';

  // Form
  h += '<div class="card gen-form">';
  h += '<h2>Parameters</h2>';

  h += '<div class="gen-grid"><div>';
  h += '<label for="gen-cat">Category</label>';
  h += '<select id="gen-cat" onchange="updateDxOptions()">';
  bp.categories.forEach(c => {
    h += '<option value="'+esc(c.category)+'">'+esc(c.category)+'</option>';
  });
  h += '</select></div>';

  h += '<div><label for="gen-diff">Difficulty</label>';
  h += '<select id="gen-diff">';
  h += '<option value="easy">Easy</option><option value="medium" selected>Medium</option><option value="hard">Hard</option>';
  h += '</select></div></div>';

  h += '<label for="gen-dx">Diagnosis</label>';
  h += '<select id="gen-dx">';
  const firstCat = bp.categories[0];
  firstCat.diagnoses.forEach(d => {
    h += '<option value="'+esc(d.name)+'|'+esc(d.code)+'">'+esc(d.name)+' ('+esc(d.code)+')</option>';
  });
  h += '</select>';

  h += '<label for="gen-key">Anthropic API Key</label>';
  h += '<input type="password" id="gen-key" placeholder="sk-ant-api03-…" value="'+esc(getApiKey())+'" />';
  h += '<div class="key-note">Stored in this browser tab only. Sent to your server for the API call — never logged or saved.</div>';

  h += '<div class="gen-grid" style="margin-top:14px"><div>';
  h += '<label for="gen-mode">Mode</label>';
  h += '<select id="gen-mode" onchange="toggleBatchOpts()">';
  h += '<option value="single">Single case</option>';
  h += '<option value="batch">Batch generate</option>';
  h += '<option value="auto">Auto-fill gaps</option>';
  h += '</select></div>';
  h += '<div id="batch-count-wrap" style="display:none">';
  h += '<label for="gen-count">Count</label>';
  h += '<input type="number" id="gen-count" min="1" max="50" value="5" style="font:inherit;padding:10px 12px;border:1.5px solid var(--border);border-radius:10px;width:100%" />';
  h += '</div></div>';
  h += '<div id="auto-note" style="display:none;margin-top:6px" class="key-note">Auto-fill reads the coverage gaps and generates cases for the categories that need them most, rotating diagnoses and difficulty. Your category/diagnosis selection above is ignored in this mode.</div>';

  h += '<div style="margin-top:16px;display:flex;gap:10px;align-items:center">';
  h += '<button class="btn" id="gen-btn" onclick="runGenerate()">⚡ Generate</button>';
  h += '<button class="btn ghost" id="stop-btn" onclick="stopBatch()" style="display:none">■ Stop</button>';
  h += '<span id="gen-counter" style="font-weight:600;color:var(--muted);font-size:14px"></span>';
  h += '</div>';
  h += '<div id="gen-progress" style="margin-top:10px"></div>';
  h += '<div id="gen-status"></div>';
  h += '<div id="gen-result"></div>';
  h += '</div>';

  app.innerHTML = h;
}

function toggleBatchOpts(){
  const mode = document.getElementById('gen-mode').value;
  document.getElementById('batch-count-wrap').style.display = (mode==='single')?'none':'block';
  document.getElementById('auto-note').style.display = (mode==='auto')?'block':'none';
}

function updateDxOptions(){
  if(!BLUEPRINT) return;
  const cat = document.getElementById('gen-cat').value;
  const sel = document.getElementById('gen-dx');
  const catObj = BLUEPRINT.categories.find(c => c.category === cat);
  if(!catObj) return;
  sel.innerHTML = '';
  catObj.diagnoses.forEach(d => {
    const o = document.createElement('option');
    o.value = d.name+'|'+d.code;
    o.textContent = d.name+' ('+d.code+')';
    sel.appendChild(o);
  });
}

let BATCH_STOP = false;

function stopBatch(){ BATCH_STOP = true; }

async function runGenerate(){
  const mode = document.getElementById('gen-mode').value;
  const apiKey = document.getElementById('gen-key').value.trim();
  if(!apiKey){ alert('Enter your Anthropic API key.'); return; }
  setApiKey(apiKey);

  if(mode === 'single') return runSingle();
  if(mode === 'batch') return runBatch();
  if(mode === 'auto') return runAutoFill();
}

// ── Single case ─────────────────────────────────────────────────────
async function runSingle(){
  const cat = document.getElementById('gen-cat').value;
  const diff = document.getElementById('gen-diff').value;
  const dxVal = document.getElementById('gen-dx').value;
  const apiKey = document.getElementById('gen-key').value.trim();
  const [diagnosisName, diagnosisCode] = dxVal.split('|');

  const btn = document.getElementById('gen-btn');
  const status = document.getElementById('gen-status');
  const result = document.getElementById('gen-result');

  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>Generating…';
  status.innerHTML = '<p style="color:var(--muted);margin-top:10px">Calling Anthropic API — this takes 30–60 seconds…</p>';
  result.innerHTML = '';
  document.getElementById('gen-progress').innerHTML = '';

  try{
    const data = await api('/api/admin/generate', {
      method: 'POST',
      body: JSON.stringify({ category: cat, difficulty: diff, diagnosisName, diagnosisCode, apiKey }),
    });
    result.innerHTML = successCard(data);
    status.innerHTML = '';
  } catch(e){
    result.innerHTML = failCard(e.message);
    status.innerHTML = '';
  }

  btn.disabled = false;
  btn.innerHTML = '⚡ Generate';
}

// ── Batch: same category/dx N times ─────────────────────────────────
async function runBatch(){
  const cat = document.getElementById('gen-cat').value;
  const diff = document.getElementById('gen-diff').value;
  const dxVal = document.getElementById('gen-dx').value;
  const apiKey = document.getElementById('gen-key').value.trim();
  const count = Math.min(50, Math.max(1, parseInt(document.getElementById('gen-count').value)||5));
  const [diagnosisName, diagnosisCode] = dxVal.split('|');

  await runLoop(count, ()=>({category:cat, difficulty:diff, diagnosisName, diagnosisCode, apiKey}));
}

// ── Auto-fill: read coverage gaps, pick targets ─────────────────────
async function runAutoFill(){
  const apiKey = document.getElementById('gen-key').value.trim();
  const count = Math.min(50, Math.max(1, parseInt(document.getElementById('gen-count').value)||10));

  // Fetch gap-aware targets from the server's blueprint logic
  let coverage;
  try{ coverage = await api('/api/admin/generate/coverage'); }
  catch(e){ document.getElementById('gen-result').innerHTML = failCard(e.message); return; }

  const gapsWithNeed = coverage.gaps.filter(g => g.need > 0);
  if(!gapsWithNeed.length){
    document.getElementById('gen-result').innerHTML =
      '<div class="gen-result success"><strong style="color:var(--correct)">All 200 targets met!</strong> No gaps to fill.</div>';
    return;
  }

  // Build a round-robin target list from gaps (largest gaps first)
  const targets = [];
  let round = 0;
  while(targets.length < count){
    let added = false;
    for(const g of gapsWithNeed){
      if(targets.length >= count) break;
      const catObj = BLUEPRINT.categories.find(c => c.category === g.category);
      if(!catObj) continue;
      const filled = targets.filter(t => t.category === g.category).length;
      if(filled >= g.need) continue;
      const dx = catObj.diagnoses[(round + filled) % catObj.diagnoses.length];
      const diffs = ['easy','medium','hard'];
      const diff = diffs[(round + filled) % 3] || 'medium';
      targets.push({ category:g.category, difficulty:diff, diagnosisName:dx.name, diagnosisCode:dx.code, apiKey });
      added = true;
    }
    round++;
    if(!added) break;
  }

  let idx = 0;
  await runLoop(targets.length, ()=>targets[idx++]);
}

// ── Shared batch loop ───────────────────────────────────────────────
async function runLoop(total, getParams){
  BATCH_STOP = false;
  const btn = document.getElementById('gen-btn');
  const stopBtn = document.getElementById('stop-btn');
  const counter = document.getElementById('gen-counter');
  const progress = document.getElementById('gen-progress');
  const status = document.getElementById('gen-status');
  const result = document.getElementById('gen-result');

  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>Running…';
  stopBtn.style.display = 'inline-flex';
  result.innerHTML = '';
  progress.innerHTML = '';

  let ok = 0, fail = 0;
  const log = [];

  for(let i = 0; i < total; i++){
    if(BATCH_STOP){ log.push({i:i+1, stopped:true}); break; }

    counter.textContent = 'Case '+(i+1)+' of '+total+'…';
    status.innerHTML = '<p style="color:var(--muted)"><span class="spinner"></span>Generating case '+(i+1)+' of '+total+' — ~30-60s per case…</p>';

    const params = getParams();
    try{
      const data = await api('/api/admin/generate', {
        method: 'POST',
        body: JSON.stringify(params),
      });
      ok++;
      log.push({i:i+1, ok:true, title:data.title, externalId:data.externalId, category:data.category, difficulty:data.difficulty, warnings:data.warnings});
    } catch(e){
      fail++;
      log.push({i:i+1, ok:false, error:e.message, category:params.category, diagnosisName:params.diagnosisName});
    }

    // Update progress bar
    const pct = Math.round((i+1)/total*100);
    progress.innerHTML = '<div style="display:flex;align-items:center;gap:10px">'
      + '<div style="flex:1;height:10px;background:var(--border);border-radius:999px;overflow:hidden">'
      + '<div style="height:100%;width:'+pct+'%;background:var(--primary);border-radius:999px;transition:width .3s"></div></div>'
      + '<span style="font-size:13px;font-weight:600;color:var(--muted);min-width:70px">'+ok+' ok'+(fail?' · '+fail+' err':'')+'</span></div>';
  }

  // Final summary
  status.innerHTML = '';
  counter.textContent = '';
  btn.disabled = false;
  btn.innerHTML = '⚡ Generate';
  stopBtn.style.display = 'none';

  let rh = '<div class="card" style="margin-top:14px"><h2>Batch complete</h2>';
  rh += '<div style="display:flex;gap:14px;margin-bottom:12px">';
  rh += '<span style="font-size:22px;font-weight:800;color:var(--correct)">'+ok+'</span><span style="color:var(--muted);font-weight:600;align-self:center">generated</span>';
  if(fail) rh += '<span style="font-size:22px;font-weight:800;color:#B23A60">'+fail+'</span><span style="color:var(--muted);font-weight:600;align-self:center">failed</span>';
  if(BATCH_STOP) rh += '<span style="color:var(--amber);font-weight:600;align-self:center">· stopped by user</span>';
  rh += '</div>';

  log.forEach(l => {
    if(l.stopped) return;
    if(l.ok){
      rh += '<div style="display:flex;gap:8px;align-items:center;margin:6px 0">';
      rh += '<span style="color:var(--correct);font-weight:700">✓</span>';
      rh += '<span style="font-weight:600">'+esc(l.title)+'</span>';
      rh += '<span class="chip">'+esc(l.category)+'</span>';
      rh += '<span class="chip">'+esc(cap(l.difficulty))+'</span>';
      rh += '<button class="btn ghost" style="padding:4px 10px;font-size:12px;margin-left:auto" onclick="openCase(\''+esc(l.externalId)+'\')">Review</button>';
      rh += '</div>';
      if(l.warnings && l.warnings.length) rh += '<div style="font-size:12px;color:var(--amber);margin-left:22px">⚠ '+l.warnings.map(esc).join(', ')+'</div>';
    } else {
      rh += '<div style="display:flex;gap:8px;align-items:center;margin:6px 0">';
      rh += '<span style="color:#B23A60;font-weight:700">✗</span>';
      rh += '<span style="color:#B23A60">'+esc(l.category)+' / '+esc(l.diagnosisName)+': '+esc(l.error)+'</span>';
      rh += '</div>';
    }
  });

  rh += '<div style="margin-top:12px">';
  rh += '<button class="btn ghost" onclick="setTab(\'sme_review\')">Review all pending</button>';
  rh += ' <button class="btn ghost" onclick="showGenerate()">Generate more</button>';
  rh += '</div></div>';
  result.innerHTML = rh;
}

// ── Result cards ────────────────────────────────────────────────────
function successCard(data){
  let rh = '<div class="gen-result success">';
  rh += '<strong style="color:var(--correct)">✓ Case generated</strong><br />';
  rh += '<strong>'+esc(data.title)+'</strong> ('+esc(data.externalId)+')<br />';
  rh += '<span class="chip" style="margin-right:6px">'+esc(data.category)+'</span>';
  rh += '<span class="chip" style="margin-right:6px">'+esc(cap(data.difficulty))+'</span>';
  rh += '<span class="chip">'+data.questionCount+' questions</span>';
  if(data.warnings && data.warnings.length){
    rh += '<div style="margin-top:8px;font-size:13px;color:var(--amber)">⚠ '+data.warnings.map(esc).join('<br />')+'</div>';
  }
  rh += '<div style="margin-top:10px">';
  rh += '<button class="btn ghost" onclick="openCase(\''+esc(data.externalId)+'\')">Review now</button>';
  rh += ' <button class="btn ghost" onclick="showGenerate()">Generate another</button>';
  rh += '</div></div>';
  return rh;
}
function failCard(msg){
  return '<div class="gen-result fail"><strong style="color:#B23A60">✗ Generation failed</strong><br />'+esc(msg)+'</div>';
}

// ═════════════════════════════════════════════════════════════════════
// CE COURSE GENERATOR
// ═════════════════════════════════════════════════════════════════════

let COURSE_SESSION = null; // { sessionId, chunks:[], done }
let COURSE_STOP = false;

function showCourse(){
  let h = tabsHtml();
  h += '<h1>CE Course Generator</h1>';
  h += '<p class="lead">Generate a full ACEP-compliant course using your template. Multi-turn — the model writes until complete.</p>';

  h += '<div class="card gen-form">';
  h += '<h2>Course parameters</h2>';

  h += '<label for="cc-title">Course Title</label>';
  h += '<input type="text" id="cc-title" placeholder="e.g. Plot Twist: Narrative Therapy Techniques That Actually Work" style="font:inherit;padding:10px 12px;border:1.5px solid var(--border);border-radius:10px;width:100%" />';

  h += '<div class="gen-grid"><div>';
  h += '<label for="cc-hours">CE Hours</label>';
  h += '<select id="cc-hours"><option value="1">1 Hour</option><option value="2" selected>2 Hours</option><option value="3">3 Hours</option></select>';
  h += '</div><div>';
  h += '<label for="cc-level">Level</label>';
  h += '<select id="cc-level"><option value="Introductory">Introductory</option><option value="Intermediate" selected>Intermediate</option><option value="Advanced">Advanced</option></select>';
  h += '</div></div>';

  h += '<label for="cc-cat">Category</label>';
  h += '<select id="cc-cat">';
  h += '<option value="Clinical Mental Health Practice">Clinical Mental Health Practice</option>';
  h += '<option value="Ethics">Ethics</option>';
  h += '<option value="Supervision">Supervision</option>';
  h += '<option value="Multicultural Competency">Multicultural Competency</option>';
  h += '<option value="Other">Other</option>';
  h += '</select>';

  h += '<label for="cc-theme">Theme / Hook <span style="color:var(--muted);font-weight:400">(optional)</span></label>';
  h += '<input type="text" id="cc-theme" placeholder="e.g. movie theme, metaphor series, pop culture lens" style="font:inherit;padding:10px 12px;border:1.5px solid var(--border);border-radius:10px;width:100%" />';

  h += '<label for="cc-special">Special Instructions <span style="color:var(--muted);font-weight:400">(optional)</span></label>';
  h += '<textarea id="cc-special" rows="2" placeholder="e.g. focus on adolescent populations, include embedded video resources" style="width:100%;font:inherit;padding:10px 12px;border:1.5px solid var(--border);border-radius:10px;resize:vertical"></textarea>';

  h += '<label for="cc-key">Anthropic API Key</label>';
  h += '<input type="password" id="cc-key" placeholder="sk-ant-api03-…" value="'+esc(getApiKey())+'" />';
  h += '<div class="key-note">Same key as the case generator. Stored in this tab only.</div>';

  h += '<div style="margin-top:16px;display:flex;gap:10px;align-items:center">';
  h += '<button class="btn" id="cc-btn" onclick="runCourse()">📄 Generate course</button>';
  h += '<button class="btn ghost" id="cc-stop" onclick="COURSE_STOP=true" style="display:none">■ Stop</button>';
  h += '<span id="cc-counter" style="font-weight:600;color:var(--muted);font-size:14px"></span>';
  h += '</div>';

  h += '<div id="cc-progress"></div>';
  h += '<div id="cc-status"></div>';
  h += '<div id="cc-result"></div>';
  h += '</div>';

  // Preview area (shows accumulated markdown)
  h += '<div id="cc-preview-wrap" style="display:none">';
  h += '<div class="card" style="margin-top:14px">';
  h += '<div style="display:flex;justify-content:space-between;align-items:center">';
  h += '<h2 style="margin:0">Course preview</h2>';
  h += '<div><button class="btn ghost" style="font-size:13px;padding:6px 12px" onclick="copyCourse()">Copy markdown</button>';
  h += ' <button class="btn ghost" style="font-size:13px;padding:6px 12px" onclick="downloadCourse()">Download .md</button></div>';
  h += '</div>';
  h += '<div id="cc-preview" style="margin-top:10px;max-height:500px;overflow-y:auto;background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:14px 16px;font-family:monospace;font-size:13px;white-space:pre-wrap;line-height:1.5"></div>';
  h += '</div></div>';

  app.innerHTML = h;
}

async function runCourse(){
  const title = document.getElementById('cc-title').value.trim();
  const ceHours = document.getElementById('cc-hours').value;
  const level = document.getElementById('cc-level').value;
  const category = document.getElementById('cc-cat').value;
  const theme = document.getElementById('cc-theme').value.trim();
  const specialInstructions = document.getElementById('cc-special').value.trim();
  const apiKey = document.getElementById('cc-key').value.trim();

  if(!title){ alert('Enter a course title.'); return; }
  if(!apiKey){ alert('Enter your Anthropic API key.'); return; }
  setApiKey(apiKey);

  COURSE_STOP = false;
  COURSE_SESSION = { sessionId: null, chunks: [], done: false };

  const btn = document.getElementById('cc-btn');
  const stopBtn = document.getElementById('cc-stop');
  const counter = document.getElementById('cc-counter');
  const progress = document.getElementById('cc-progress');
  const status = document.getElementById('cc-status');
  const result = document.getElementById('cc-result');
  const previewWrap = document.getElementById('cc-preview-wrap');
  const preview = document.getElementById('cc-preview');

  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>Generating…';
  stopBtn.style.display = 'inline-flex';
  result.innerHTML = '';
  previewWrap.style.display = 'block';
  preview.textContent = '';

  const wordTargets = { '1': 6000, '2': 12000, '3': 18000 };
  const targetWords = wordTargets[ceHours] || 12000;

  // ── First call ──
  counter.textContent = 'Turn 1 — starting course…';
  status.innerHTML = '<p style="color:var(--muted)"><span class="spinner"></span>Generating initial content (~60-90s)…</p>';

  let data;
  try {
    data = await api('/api/admin/generate/course', {
      method: 'POST',
      body: JSON.stringify({ title, ceHours: Number(ceHours), category, level, theme, specialInstructions, apiKey }),
    });
  } catch(e){
    result.innerHTML = failCard(e.message);
    resetCourseBtn(); return;
  }

  COURSE_SESSION.sessionId = data.sessionId;
  COURSE_SESSION.chunks.push(data.chunk);
  preview.textContent = COURSE_SESSION.chunks.join('');
  preview.scrollTop = preview.scrollHeight;

  let turn = 1;
  let totalWords = data.wordCount;
  updateCourseProgress(totalWords, targetWords, progress);

  // ── Continue loop ──
  while(!data.done && !COURSE_STOP && turn < 15){
    turn++;
    counter.textContent = 'Turn '+turn+' — continuing…';
    status.innerHTML = '<p style="color:var(--muted)"><span class="spinner"></span>Continue call '+turn+' (~60-90s)… '+totalWords.toLocaleString()+' words so far</p>';

    try {
      data = await api('/api/admin/generate/course/continue', {
        method: 'POST',
        body: JSON.stringify({ sessionId: COURSE_SESSION.sessionId }),
      });
    } catch(e){
      result.innerHTML += '<div class="gen-result fail" style="margin-top:8px"><strong style="color:#B23A60">Continue failed on turn '+turn+'</strong><br />'+esc(e.message)+'<br />The content generated so far is still available above.</div>';
      break;
    }

    COURSE_SESSION.chunks.push(data.chunk);
    COURSE_SESSION.done = data.done;
    preview.textContent = COURSE_SESSION.chunks.join('');
    preview.scrollTop = preview.scrollHeight;
    totalWords = data.wordCount;
    updateCourseProgress(totalWords, targetWords, progress);
  }

  // ── Done ──
  status.innerHTML = '';
  counter.textContent = '';

  let rh = '<div class="gen-result success">';
  rh += '<strong style="color:var(--correct)">✓ Course generated</strong>';
  if(COURSE_STOP) rh += ' <span style="color:var(--amber)">(stopped by user)</span>';
  rh += '<br /><strong>'+esc(title)+'</strong>';
  rh += '<br /><span class="chip" style="margin-right:6px">'+esc(ceHours)+' CE hours</span>';
  rh += '<span class="chip" style="margin-right:6px">'+esc(category)+'</span>';
  rh += '<span class="chip" style="margin-right:6px">'+esc(level)+'</span>';
  rh += '<span class="chip">~'+totalWords.toLocaleString()+' words</span>';
  rh += '<span class="chip" style="margin-left:4px">'+turn+' turn'+(turn>1?'s':'')+'</span>';

  const metMin = totalWords >= (targetWords * 0.9);
  if(!metMin) rh += '<div style="margin-top:8px;font-size:13px;color:var(--amber)">⚠ Word count may be below ACEP minimum ('+targetWords.toLocaleString()+'). Review and expand if needed.</div>';

  rh += '<div style="margin-top:10px">';
  rh += '<button class="btn ghost" onclick="copyCourse()">Copy markdown</button>';
  rh += ' <button class="btn ghost" onclick="downloadCourse()">Download .md</button>';
  rh += ' <button class="btn ghost" onclick="showCourse()">Generate another</button>';
  rh += '</div></div>';
  result.innerHTML = rh;

  resetCourseBtn();
}

function resetCourseBtn(){
  const btn = document.getElementById('cc-btn');
  btn.disabled = false;
  btn.innerHTML = '📄 Generate course';
  document.getElementById('cc-stop').style.display = 'none';
}

function updateCourseProgress(words, target, el){
  const pct = Math.min(100, Math.round(words / target * 100));
  const color = pct >= 100 ? 'var(--correct)' : pct >= 60 ? 'var(--amber)' : 'var(--review)';
  el.innerHTML = '<div style="display:flex;align-items:center;gap:10px;margin-top:8px">'
    + '<span style="font-size:13px;color:var(--muted);min-width:80px">'+words.toLocaleString()+' words</span>'
    + '<div style="flex:1;height:10px;background:var(--border);border-radius:999px;overflow:hidden">'
    + '<div style="height:100%;width:'+pct+'%;background:'+color+';border-radius:999px;transition:width .3s"></div></div>'
    + '<span style="font-size:13px;color:var(--muted);min-width:80px;text-align:right">'+pct+'% of '+target.toLocaleString()+'</span></div>';
}

function copyCourse(){
  if(!COURSE_SESSION || !COURSE_SESSION.chunks.length) return;
  const md = COURSE_SESSION.chunks.join('');
  navigator.clipboard.writeText(md).then(()=> alert('Copied to clipboard!')).catch(()=> alert('Copy failed — use Download instead.'));
}

function downloadCourse(){
  if(!COURSE_SESSION || !COURSE_SESSION.chunks.length) return;
  const md = COURSE_SESSION.chunks.join('');
  const title = (document.getElementById('cc-title') && document.getElementById('cc-title').value) || 'course';
  const slug = title.toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/-+$/,'').slice(0,50);
  const blob = new Blob([md], {type:'text/markdown'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = slug+'.md';
  a.click();
  URL.revokeObjectURL(a.href);
}

async function openCase(externalId){
  app.innerHTML = '<p class="lead">Loading…</p>';
  let item;
  try{ item = (await api('/api/admin/content/'+encodeURIComponent(externalId))).item; }
  catch(e){ return gate(e.message); }
  renderReview(item);
}

function renderReview(item){
  const c = item.caseSim; const dx = c.diagnosis||c.primaryDiagnosis||{};
  const refMap={}; (c.references||[]).forEach(r=>refMap[r.id]=r);
  const isPending = item.status==='sme_review';

  let h = '<button class="back" onclick="showList()">‹ Back to list</button>';
  h += '<div class="row" style="justify-content:space-between"><h1 style="margin:0">'+esc(c.title)+'</h1>'
     + '<span class="status '+esc(item.status)+'">'+(isPending?'Pending':'Published')+'</span></div>';
  h += '<div class="chips" style="margin:8px 0 14px"><span class="chip">'+esc(c.category)+'</span><span class="chip">'+esc(cap(c.difficulty))+'</span></div>';

  // action bar
  h += '<div class="row" id="actions">'+actionButtons(item)+'</div>';
  h += '<p id="msg"></p>';

  h += '<div class="card"><div class="seg-label">Reviewer note'
     + (item.needsWork?' &nbsp;<span class="status needs">flagged: needs work</span>':'')
     + '</div>'
     + '<textarea id="note" rows="3" style="width:100%;font:inherit;padding:10px 12px;border:1.5px solid var(--border);border-radius:10px;margin-top:6px;resize:vertical" placeholder="Flag edits to yourself — e.g. &quot;Q3 distractor too weak, rewrite.&quot; Saving a note marks this case as needs-work.">'+esc(item.reviewNote||'')+'</textarea>'
     + '<div class="row" style="margin-top:8px"><button class="btn ghost" onclick="saveNote(\''+esc(item.externalId)+'\')">Save note</button><span id="noteMsg"></span></div></div>';

  // vignette + diagnosis
  h += '<div class="card"><div class="vignette">';
  const seg=(l,t)=>t?'<div class="seg"><div class="seg-label">'+l+'</div>'+esc(t)+'</div>':'';
  h += seg('Intake',c.narrative&&c.narrative.intake)+seg('Session 1',c.narrative&&c.narrative.session1)+seg('Session 2',c.narrative&&c.narrative.session2);
  h += '</div>';
  if(dx.name) h += '<div class="dx"><div class="seg-label">Working diagnosis</div><strong>'+esc(dx.name)+(dx.code?' ('+esc(dx.code)+')':'')+'</strong></div>';
  if(c.diagnosticRationale) h += '<div class="seg"><div class="seg-label">Diagnostic rationale</div>'+esc(c.diagnosticRationale)+'</div>';
  h += '</div>';

  // questions — full, with keyed answer + explanations + evidence shown
  h += '<div class="card"><h2>Questions ('+c.questions.length+')</h2>';
  c.questions.forEach((q,i)=>{
    h += '<div class="q"><div class="qmeta">Q'+(i+1)+' · '+esc(q.domain)+'</div><div class="qstem">'+esc(q.question)+'</div>';
    q.options.forEach(o=>{
      h += '<div class="opt'+(o.isCorrect?' correct':'')+'"><div class="otext">'+esc(o.text)+'</div>';
      if(o.rationale) h += '<div class="orat">'+esc(o.rationale)+'</div>';
      if(o.isCorrect && o.explanation){
        const ex=o.explanation;
        h += '<div class="ex">';
        if(ex.approach) h += '<div><b>Approach:</b> '+esc(ex.approach)+'</div>';
        if(ex.rationale) h += '<div><b>Why:</b> '+esc(ex.rationale)+'</div>';
        if(ex.keyIndicators&&ex.keyIndicators.length) h += '<div><b>Key indicators:</b><ul>'+ex.keyIndicators.map(k=>'<li>'+esc(k)+'</li>').join('')+'</ul></div>';
        if(ex.commonMistake) h += '<div><b>Common mistake:</b> '+esc(ex.commonMistake)+'</div>';
        h += '</div>';
      }
      h += '</div>';
    });
    (q.evidenceRef||[]).forEach(rid=>{ const r=refMap[rid]; if(r) h+='<div class="source"><span class="src-name">'+esc(r.source)+'</span><span class="src-detail">'+esc(r.detail)+'</span></div>'; });
    h += '</div>';
  });
  h += '</div>';

  h += '<div class="row">'+actionButtons(item)+'</div>';
  app.innerHTML = h;
}

function actionButtons(item){
  if(item.status==='sme_review'){
    return '<button class="btn pub" onclick="publish(\''+esc(item.externalId)+'\')">Approve &amp; publish</button>'
         + '<button class="btn ghost" onclick="showList()">Not yet</button>';
  }
  return '<button class="btn ghost" onclick="unpublish(\''+esc(item.externalId)+'\')">Unpublish (send back to pending)</button>';
}

async function publish(id){
  const msg=document.getElementById('msg');
  try{ await api('/api/admin/content/'+encodeURIComponent(id)+'/publish',{method:'POST',body:JSON.stringify({})});
    if(msg){ msg.className='ok'; msg.textContent='Published — now live to learners.'; }
    setTimeout(showList, 700);
  }catch(e){ if(msg){ msg.className='err'; msg.textContent=e.message; } }
}
async function unpublish(id){
  try{ await api('/api/admin/content/'+encodeURIComponent(id)+'/unpublish',{method:'POST',body:JSON.stringify({})}); showList(); }
  catch(e){ const msg=document.getElementById('msg'); if(msg){ msg.className='err'; msg.textContent=e.message; } }
}
async function saveNote(id){
  const note=document.getElementById('note').value;
  const m=document.getElementById('noteMsg');
  try{
    const r=await api('/api/admin/content/'+encodeURIComponent(id)+'/note',{method:'POST',body:JSON.stringify({note:note})});
    if(m){ m.className='ok'; m.textContent = r.needsWork ? 'Saved — flagged as needs work.' : 'Saved.'; }
  }catch(e){ if(m){ m.className='err'; m.textContent=e.message; } }
}

gate('');
</script>
